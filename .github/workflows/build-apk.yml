name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap and expect
        run: |
          npm install -g @bubblewrap/cli
          sudo apt-get update
          sudo apt-get install -y expect

      - name: Initialize Bubblewrap project
        run: |
          expect -c '
          spawn bubblewrap init --manifest https://egormakarchikov1-svg.github.io/GT7/manifest.json
          expect "Do you want Bubblewrap to install the JDK (recommended)?"
          send "Y\r"
          expect "Do you want Bubblewrap to install the Android SDK (recommended)?"
          send "Y\r"
          interact
          '

      - name: Build APK
        run: bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gt7-android-app
          path: |
            ./*.apk
            ./*.aab

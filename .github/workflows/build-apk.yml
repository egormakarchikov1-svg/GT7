name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install PWA Builder CLI
        run: npm install -g @pwabuilder/cli
        
      - name: Build APK
        run: pwabuilder build --platform android --url https://egormakarchikov1-svg.github.io/GT7/
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gt7-app
          path: |
            **/*.apk
            **/*.aab

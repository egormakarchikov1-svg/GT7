<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>GT7 Random Race — Погода и время по трассам</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a1a;
            color: #eee;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
            touch-action: pan-y pinch-zoom;
        }
        .container {
            background-image: url('images/gt7images.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
            z-index: 0;
        }
        .container > * {
            position: relative;
            z-index: 1;
        }
        .content {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        .param-block {
            margin-bottom: 24px;
            padding: 12px 16px;
            background: rgba(10, 15, 30, 0.65);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            border: 1px solid rgba(255,255,240,0.15);
            transition: all 0.2s;
        }
        .param-header {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .lock-container button {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 6px 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease;
        }
        .lock-container button:active {
            transform: scale(0.92);
        }
        .lock-container img {
            width: 30px;
            height: 30px;
            display: block;
        }
        .param-label {
            font-weight: 800;
            background: #ff4d4dcc;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 15px;
            letter-spacing: 1px;
            color: white;
            backdrop-filter: blur(2px);
        }
        .icon-container {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            min-height: 55px;
        }
        .car-icon {
            max-width: 100%;
            max-height: 75px;
            width: auto;
            object-fit: contain;
        }
        .track-icon {
            max-width: 100%;
            max-height: 65px;
            width: auto;
            object-fit: contain;
        }
        .param-value {
            font-size: 16px;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.55);
            padding: 12px 16px;
            border-radius: 28px;
            margin-top: 8px;
            word-break: break-word;
            text-align: left;
            backdrop-filter: blur(2px);
            border-left: 3px solid #ff4d4d;
        }
        button:not(.lock-btn) {
            background: #ff4d4d;
            border: none;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 60px;
            width: 100%;
            color: white;
            transition: all 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
        }
        button:not(.lock-btn):active {
            transform: scale(0.97);
            background: #e03a3a;
        }
        @media (max-width: 480px) {
            .container { padding: 16px; }
            .param-label { font-size: 13px; padding: 5px 12px; }
            .param-value { font-size: 14px; padding: 10px 12px; }
            .car-icon { max-height: 65px; }
            .track-icon { max-height: 55px; }
            .lock-container img { width: 28px; height: 28px; }
        }
        @media (max-width: 380px) {
            .param-header { gap: 8px; }
            .param-label { font-size: 12px; }
        }
    </style>
</head>

    // Дополним несколько недостающих вручную (из финала таблицы)
    const extraTracks = [
        { name: "Япония Kyoto Driving Park - Miyabi", icon: "track_icons/16ccbf-HZopm0Jc.png", weatherType: "S01-C06", timeOptions: ["Рассвет","Восход","Раннее утро","Позднее утро","День","Вечер","Закат","Сумерки","Ночь"] },
        { name: "Япония Kyoto Driving Park - Yamagiwa", icon: "track_icons/16ccbf-HZopm0Jc.png", weatherType: "S01-C06", timeOptions: ["Рассвет","Восход","Раннее утро","Позднее утро","День","Вечер","Закат","Сумерки","Ночь"] },
        { name: "Япония Kyoto Driving Park - Yamagiwa (обратн.)", icon: "track_icons/16ccbf-HZopm0Jc.png", weatherType: "S01-C06", timeOptions: ["Рассвет","Восход","Раннее утро","Позднее утро","День","Вечер","Закат","Сумерки","Ночь"] },
        { name: "Япония Kyoto Driving Park - Yamagiwa + Miyabi", icon: "track_icons/16ccbf-HZopm0Jc.png", weatherType: "S01-C06", timeOptions: ["Рассвет","Восход","Раннее утро","Позднее утро","День","Вечер","Закат","Сумерки","Ночь"] },
        { name: "Япония Kyoto Driving Park - Yamagiwa + Miyabi (обратн.)", icon: "track_icons/16ccbf-HZopm0Jc.png", weatherType: "S01-C06", timeOptions: ["Рассвет","Восход","Раннее утро","Позднее утро","День","Вечер","Закат","Сумерки","Ночь"] },
        { name: "США Michelin Raceway Road Atlanta", icon: "track_icons/051834-BK1vS4TT.png", weatherType: "S01-C06", timeOptions: ["Заря","Рассвет","Восход","Ранее утро","Позднее утро","День","Вечер","Закат","Сумерки","ночь","полночь"] },
        { name: "Австралия Mount Panorama Motor Racing Circuit", icon: "track_icons/28b64f-DwW557Cx.png", weatherType: "S01-C06", timeOptions: ["Заря","Рассвет","Восход","Ранее утро","Позднее утро","День","Вечер","Закат","Сумерки","ночь","полночь"] },
        { name: "Германия Nürburgring (24 часа)", icon: "track_icons/246f6d-B2a8UX0a.png", weatherType: "S01-R08", timeOptions: ["Заря","Рассвет","Восход","Ранее утро","Позднее утро","День","Вечер","Закат","Сумерки","ночь","полночь"] },
        { name: "Германия Nürburgring (гонка на выносливость)", icon: "track_icons/246f6d-B2a8UX0a.png", weatherType: "S01-R08", timeOptions: ["Восход","Раннее утро","Позднее утро","День","Вечер","Закат","Сумерки"] },
        { name: "Германия Nürburgring (спринт)", icon: "track_icons/246f6d-B2a8UX0a.png", weatherType: "S01-R08", timeOptions: ["Ранее утро","Позднее утро","день","Вечер","Закат"] }
    ];
    const fullTracks = [...tracksDatabase, ...extraTracks];
    
    // МАШИНЫ (из примера, но можно расширить)
    const carIcons = {
        "Abarth 1500 Biposto Bertone B.A.T 1 '52": "car_icons/car1932.png",
        "Abarth 500 '09": "car_icons/car1973.png",
        "BMW M3 '07": "car_icons/car1399.png",
        "Nissan GT-R '17": "car_icons/car2167.png",
        "Porsche 911 GT3 RS '22": "car_icons/car3539.png",
        "Ferrari 488 GTB '19": "car_icons/ferrari488.png",
        "Lamborghini Huracan GT3": "car_icons/lambo.png"
    };
    const cars = Object.keys(carIcons);
    
    // ПОГОДА по правилам S01-C06 и S01-R08
    const clearWeathers = ["S01 (Ясно, безоблачно)", "S02 (Ясно, малооблачно)", "S03 (Ясно, переменная облачность)", "C01 (Пасмурно, но ярко)", "C02 (Пасмурно, тепло)"];
    const fullWeathers = [...clearWeathers, "R01 (Мелкий дождь, морось)", "R02 (Умеренный дождь)", "R03 (Сильный дождь, ливень)"];
    
    function getWeatherByTrack(weatherType) {
        const pool = weatherType === "S01-R08" ? fullWeathers : clearWeathers;
        return pool[Math.floor(Math.random() * pool.length)];
    }
    
    let lockCar = false, lockTrack = false, lockWeather = false, lockTime = false;
    let currentTrackObj = null;
    let currentCar = "", currentTrackName = "", currentWeather = "", currentTimeOption = "";
    
    function getRandomTimeMultiplier() { return Math.floor(Math.random() * 30) + 1; }
    
    function randomCar() { return cars[Math.floor(Math.random() * cars.length)]; }
    function randomTrack() { return fullTracks[Math.floor(Math.random() * fullTracks.length)]; }
    
    function updateUI() {
        document.getElementById('carValue').innerText = currentCar;
        document.getElementById('trackValue').innerText = currentTrackName;
        document.getElementById('weatherValue').innerText = currentWeather;
        const multiplier = getRandomTimeMultiplier();
        document.getElementById('timeValue').innerHTML = `${currentTimeOption} <span style="opacity:0.8; font-size:0.85rem;">(x${multiplier})</span>`;
        
        const carIconEl = document.getElementById('carIcon');
        if (carIconEl && carIcons[currentCar]) { carIconEl.src = carIcons[currentCar]; carIconEl.style.display = "block"; carIconEl.onerror = () => carIconEl.style.display = "none"; }
        else if(carIconEl) carIconEl.style.display = "none";
        
        const trackIconEl = document.getElementById('trackIcon');
        if (trackIconEl && currentTrackObj?.icon) { trackIconEl.src = currentTrackObj.icon; trackIconEl.style.display = "block"; trackIconEl.onerror = () => trackIconEl.style.display = "none"; }
        else if(trackIconEl) trackIconEl.style.display = "none";
    }
    
    function refreshAll(forceAll = true) {
        if (!lockCar || forceAll) currentCar = randomCar();
        if (!lockTrack || forceAll) { currentTrackObj = randomTrack(); currentTrackName = currentTrackObj.name; }
        if (!lockWeather || forceAll) currentWeather = getWeatherByTrack(currentTrackObj.weatherType);
        if (!lockTime || forceAll) {
            const timeArr = currentTrackObj.timeOptions;
            currentTimeOption = timeArr.length ? timeArr[Math.floor(Math.random() * timeArr.length)] : "День";
        }
        updateUI();
    }
    
    function updateLockButtonsUI() {
        document.querySelector('#lockCar img').src = lockCar ? "locked.png" : "unlocked.png";
        document.querySelector('#lockTrack img').src = lockTrack ? "locked.png" : "unlocked.png";
        document.querySelector('#lockWeather img').src = lockWeather ? "locked.png" : "unlocked.png";
        document.querySelector('#lockTime img').src = lockTime ? "locked.png" : "unlocked.png";
    }
    
    document.getElementById('lockCar').addEventListener('click', () => { lockCar = !lockCar; updateLockButtonsUI(); if(!lockCar) refreshAll(false); });
    document.getElementById('lockTrack').addEventListener('click', () => { lockTrack = !lockTrack; updateLockButtonsUI(); if(!lockTrack) refreshAll(false); });
    document.getElementById('lockWeather').addEventListener('click', () => { lockWeather = !lockWeather; updateLockButtonsUI(); if(!lockWeather) refreshAll(false); });
    document.getElementById('lockTime').addEventListener('click', () => { lockTime = !lockTime; updateLockButtonsUI(); if(!lockTime) refreshAll(false); });
    document.getElementById('randomBtn').addEventListener('click', () => refreshAll(true));
    
    // инициализация
    refreshAll(true);
    updateLockButtonsUI();
</script>
</body>
</html>

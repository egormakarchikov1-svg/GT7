<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>GT7 Random Race — реальные условия трасс</title>
    <link rel="apple-touch-icon" href="gt7.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-image: url('images/gt7images.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #eee;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР */
        .container {
            background: rgba(30, 41, 59, 0.75);
            backdrop-filter: blur(5px);
            border-radius: 32px;
            padding: 20px 16px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 10px 25px rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s ease;
        }

        /* СЕТКА — ВСЕГДА 2 КОЛОНКИ */
        .params-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
        }

        /* КАРТОЧКА ПАРАМЕТРА */
        .param-block {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0,0,0,0.25);
            border-radius: 24px;
            padding: 12px 8px;
            transition: all 0.2s;
        }

        .param-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
            width: 100%;
        }

        .param-label {
            font-weight: 700;
            color: #ffffff;
            background: #0f172a;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .lock-btn {
            background: rgba(0,0,0,0.6);
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            padding: 4px 12px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: 0.1s linear;
        }
        .lock-btn:active { transform: scale(0.94); }
        .lock-btn[data-state="unlocked"] { background: #22c55e; color: white; box-shadow: 0 0 6px #22c55e; }
        .lock-btn[data-state="locked"]   { background: #ef4444; color: white; box-shadow: 0 0 6px #ef4444; }

        .header-icon {
            width: 20px;
            height: 20px;
            object-fit: contain;
            filter: drop-shadow(0 1px 2px black);
        }

        .icon-container,
        .weather-icon-container,
        .time-icon-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 6px 0;
            min-height: 85px;
        }

        .car-icon, .track-icon {
            max-width: 100%;
            max-height: 90px;
            width: auto;
            object-fit: contain;
        }

        .weather-display-icon, .time-display-icon {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }

        .param-value {
            background: #0f172a80;
            padding: 8px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            width: 100%;
            margin-top: 6px;
            word-break: break-word;
            text-align: center;
        }

        /* БЛОК ПОХОЖИХ АВТО */
        .similar-cars-container {
            background: rgba(0,0,0,0.5);
            border-radius: 24px;
            padding: 14px;
            margin: 20px 0 12px;
            border: 1px solid #ff4d4d;
        }
        .similar-title {
            color: #ff4d4d;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 12px;
            display: flex;
            justify-content: center;
            gap: 8px;
        }
        .ref-car-info {
            background: #ff4d4d20;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            border-left: 4px solid #ff4d4d;
            margin-bottom: 12px;
            text-align: left;
        }
        .similar-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .similar-list li {
            background: #0f172a;
            padding: 10px 12px;
            border-radius: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.75rem;
            gap: 8px;
        }
        .similar-list li:active { transform: scale(0.98); background: #1e293b; }
        .car-name { 
            font-weight: bold; 
            font-size: 0.85rem; 
            flex: 2; 
            min-width: 120px;
            text-align: left;
        }
        .car-stats { 
            display: flex; 
            gap: 12px; 
            color: #ff4d4d; 
            font-weight: 500;
            font-size: 0.7rem;
            flex-wrap: wrap;
            justify-content: flex-start;
        }
        .similarity-badge { 
            background: #22c55e; 
            border-radius: 40px; 
            padding: 2px 8px; 
            font-weight: bold;
            font-size: 0.7rem;
            white-space: nowrap;
        }

        /* КНОПКИ */
        .btn-main {
            background: #ff4d4d;
            border: none;
            font-weight: 800;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 1rem;
            letter-spacing: 1px;
            color: white;
            width: 100%;
            cursor: pointer;
            transition: 0.1s;
            margin-top: 6px;
            text-transform: uppercase;
        }
        .btn-similar {
            background: #7c3aed;
            width: 100%;
            border: none;
            padding: 10px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            margin-top: 8px;
            cursor: pointer;
        }
        button:active { transform: scale(0.97); }

        /* ===== АДАПТАЦИЯ ПОД ТЕЛЕФОН (вертикаль / горизонталь) И ПК ===== */
        @media (orientation: portrait) and (max-width: 600px) {
            body { padding: 10px; }
            .params-grid { gap: 12px; }
            .car-icon, .track-icon { max-height: 75px; }
            .weather-display-icon, .time-display-icon { width: 50px; height: 50px; }
            .param-label { font-size: 0.75rem; padding: 4px 10px; }
            .param-value { font-size: 0.75rem; }
            .car-name { font-size: 0.75rem; min-width: 100px; }
            .car-stats { gap: 8px; font-size: 0.65rem; }
        }

        @media (orientation: landscape) and (max-width: 900px) {
            body { padding: 8px; }
            .container { max-width: 95%; padding: 12px; }
            .params-grid { gap: 12px; }
            .car-icon, .track-icon { max-height: 55px; }
            .weather-display-icon, .time-display-icon { width: 40px; height: 40px; }
            .param-label { font-size: 0.7rem; padding: 4px 8px; }
            .param-value { font-size: 0.7rem; padding: 5px 6px; }
            .icon-container, .weather-icon-container, .time-icon-container { min-height: 60px; }
            .similar-list li { font-size: 0.65rem; padding: 6px 10px; }
            .car-name { font-size: 0.7rem; min-width: 90px; }
            .car-stats { font-size: 0.6rem; gap: 6px; }
            .btn-main { font-size: 0.8rem; padding: 8px 12px; }
        }

        @media (min-width: 1024px) {
            body { padding: 30px; }
            .container { max-width: 900px; padding: 28px 24px; }
            .params-grid { gap: 28px; }
            .car-icon, .track-icon { max-height: 130px; }
            .weather-display-icon, .time-display-icon { width: 80px; height: 80px; }
            .param-label { font-size: 1.1rem; padding: 8px 20px; }
            .param-value { font-size: 1rem; }
            .btn-main { font-size: 1.2rem; padding: 14px; }
            .car-name { font-size: 1rem; }
            .car-stats { font-size: 0.85rem; }
        }
    </style>
</head>

</div>

    const tracks = [
        // ВСТАВЬТЕ ВАШИ ТРАССЫ СЮДА
        // Пример: "Франция Alsace - Деревня",
    ];

    // ============================================================
    // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ (НЕ ТРОГАТЬ)
    // ============================================================
    
    // при отсутствии трассы в словаре — дефолт
    function getTrackWeatherTime(trackName) {
        for (let key in trackConditions) {
            if (trackName.includes(key.split(" - ")[0]) || trackName.includes(key.split(" ")[0]))
                return trackConditions[key];
        }
        return { weather: ["S01-C06"], times: ["День","Вечер"] };
    }

    // ---------------------------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ----------------------------
    let currentRefCar = null;
    let currentTrack = null;
    const locks = { car: false, track: false, weather: false, time: false };

    function getRandomItem(arr) { 
        if (!arr || arr.length === 0) return null;
        return arr[Math.floor(Math.random() * arr.length)]; 
    }

    // иконка трассы
    function getTrackIcon(trackName) {
        if (trackName.includes("Alsace")) return "track_icons/bbe708-D-n15MKA.png";
        if (trackName.includes("Lago Maggiore")) return "track_icons/39f155-Dg_fFdVS.png";
        if (trackName.includes("Monza")) return "track_icons/f8bd64-VsJVPuq0.png";
        if (trackName.includes("Blue Moon")) return "track_icons/971481-BdMNGGxX.png";
        if (trackName.includes("Nürburgring")) return "track_icons/246f6d-B2a8UX0a.png";
        if (trackName.includes("Tokyo Expressway")) return "track_icons/e9dd33-B7sGBTmw.png";
        return "track_icons/placeholder.png";
    }

    function getRandomWeatherByCategory(weatherCategory) {
        let isRain = weatherCategory && weatherCategory.includes("R08");
        let filtered = weathers.filter(w => isRain ? (w.code && w.code.includes("R08")) : (w.code && w.code.includes("C06")));
        if (!filtered.length) filtered = weathers;
        return getRandomItem(filtered);
    }

    // Подсчёт схожести автомобилей
    function calculateSimilarity(c1, c2) {
        let hpDiff = Math.abs(c1.hp - c2.hp) / Math.max(c1.hp, c2.hp, 100);
        let wDiff = Math.abs(c1.weight - c2.weight) / Math.max(c1.weight, c2.weight, 500);
        let ptwDiff = Math.abs(c1.powerToWeight - c2.powerToWeight) / Math.max(c1.powerToWeight, c2.powerToWeight, 0.1);
        let sim = (1 - (hpDiff * 0.3 + wDiff * 0.3 + ptwDiff * 0.4)) * 100;
        return Math.min(100, Math.max(0, sim));
    }

    function findSimilarCars(ref, count = 5, randomize = true) {
        if (!carsDatabase.length) return [];
        let list = carsDatabase.filter(c => c.name !== ref.name).map(c => ({ ...c, similarity: calculateSimilarity(ref, c) }));
        list.sort((a,b) => b.similarity - a.similarity);
        let top = list.slice(0, 15);
        if (randomize) {
            for (let i = top.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i+1));
                [top[i], top[j]] = [top[j], top[i]];
            }
        }
        return top.slice(0, count);
    }

    function displaySimilarCars(ref) {
        if (!ref) return;
        currentRefCar = ref;
        let similar = findSimilarCars(ref, 5, false);
        let ptwFormatted = (ref.powerToWeight * 1000).toFixed(1);
        document.getElementById('refCarInfo').innerHTML = `🎯 РЕФЕРЕНС: <strong>${ref.name}</strong><br>⚡ ${ref.hp} л.с. | ⚖️ ${ref.weight} кг | 🚀 ${ptwFormatted} л.с./т`;
        
        if (similar.length === 0) {
            document.getElementById('similarList').innerHTML = '<li>Нет данных для сравнения</li>';
            return;
        }
        
        document.getElementById('similarList').innerHTML = similar.map((c, idx) => {
            let ptw = (c.powerToWeight * 1000).toFixed(1);
            return `
                <li onclick="selectCar('${c.name.replace(/'/g, "\\'")}')">
                    <span class="car-name">${idx+1}. ${c.name}</span>
                    <div class="car-stats">${c.hp} л.с. / ${c.weight} кг / ${ptw} л.с./т</div>
                    <span class="similarity-badge">${c.similarity.toFixed(1)}%</span>
                </li>
            `;
        }).join('');
    }

    window.selectCar = function(carName) {
        let car = carsDatabase.find(c => c.name === carName);
        if (car) {
            displaySimilarCars(car);
            document.getElementById('carValue').innerText = car.name;
            let iconImg = document.getElementById('carIcon');
            iconImg.src = car.icon;
            iconImg.style.display = 'block';
        }
    };

    function updateCarAndSync() {
        if (locks.car) return;
        let car = getRandomItem(carsDatabase);
        if (!car) return;
        document.getElementById('carValue').innerText = car.name;
        document.getElementById('carIcon').src = car.icon;
        document.getElementById('carIcon').style.display = 'block';
        displaySimilarCars(car);
    }

    function refreshSimilarCars() {
        if (currentRefCar) {
            let randomSim = findSimilarCars(currentRefCar, 5, true);
            if (randomSim.length === 0) {
                document.getElementById('similarList').innerHTML = '<li>Нет данных для сравнения</li>';
                return;
            }
            document.getElementById('similarList').innerHTML = randomSim.map((c, idx) => {
                let ptw = (c.powerToWeight * 1000).toFixed(1);
                return `
                    <li onclick="selectCar('${c.name.replace(/'/g, "\\'")}')">
                        <span class="car-name">${idx+1}. ${c.name}</span>
                        <div class="car-stats">${c.hp} л.с. / ${c.weight} кг / ${ptw} л.с./т</div>
                        <span class="similarity-badge">${c.similarity.toFixed(1)}%</span>
                    </li>
                `;
            }).join('');
        } else {
            let rand = getRandomItem(carsDatabase);
            if (rand) displaySimilarCars(rand);
        }
    }

    // обновление погоды / времени по трассе
    function updateWeatherByTrack(trackName) {
        if (locks.weather) return;
        let cond = getTrackWeatherTime(trackName);
        let weatherCat = getRandomItem(cond.weather);
        let wObj = getRandomWeatherByCategory(weatherCat);
        if (wObj) {
            document.getElementById('weatherValue').innerText = wObj.name;
            document.getElementById('weatherIcon').src = wObj.icon;
        }
    }
    
    function updateTimeByTrack(trackName) {
        if (locks.time) return;
        let cond = getTrackWeatherTime(trackName);
        let timeName = getRandomItem(cond.times);
        let tObj = times.find(t => t.name === timeName) || times[5];
        if (tObj) {
            document.getElementById('timeValue').innerHTML = `${tObj.name} <span id="xValue" style="color: #ff9999;">(X--)</span>`;
            document.getElementById('timeIcon').src = tObj.icon;
        }
        let x = Math.floor(Math.random() * 30) + 1;
        let xSpan = document.getElementById('xValue');
        if (xSpan) xSpan.innerText = `(X${x.toString().padStart(2, '0')})`;
    }

    function updateTrack() {
        if (locks.track) return;
        let track = getRandomItem(tracks);
        if (!track) return;
        currentTrack = track;
        document.getElementById('trackValue').innerText = track;
        let iconUrl = getTrackIcon(track);
        let trackIcon = document.getElementById('trackIcon');
        if (iconUrl) { trackIcon.src = iconUrl; trackIcon.style.display = 'block'; }
        else trackIcon.style.display = 'none';
        if (!locks.weather) updateWeatherByTrack(track);
        if (!locks.time) updateTimeByTrack(track);
    }
    
    function updateWeather() {
        if (locks.weather) return;
        let track = currentTrack || document.getElementById('trackValue').innerText;
        if (track && track !== "—" && track !== "Нет данных") updateWeatherByTrack(track);
        else {
            let w = getRandomItem(weathers);
            if (w) {
                document.getElementById('weatherValue').innerText = w.name;
                document.getElementById('weatherIcon').src = w.icon;
            }
        }
    }
    
    function updateTime() {
        if (locks.time) return;
        let track = currentTrack || document.getElementById('trackValue').innerText;
        if (track && track !== "—" && track !== "Нет данных") updateTimeByTrack(track);
        else {
            let t = getRandomItem(times);
            if (t) {
                document.getElementById('timeValue').innerHTML = `${t.name} <span id="xValue" style="color: #ff9999;">(X--)</span>`;
                document.getElementById('timeIcon').src = t.icon;
            }
            let x = Math.floor(Math.random() * 30) + 1;
            let xSpan = document.getElementById('xValue');
            if (xSpan) xSpan.innerText = `(X${x.toString().padStart(2, '0')})`;
        }
    }
    
    function updateUnlockedOnly() {
        if (!locks.car) updateCarAndSync();
        if (!locks.track) updateTrack();
        if (!locks.weather) updateWeather();
        if (!locks.time) updateTime();
    }

    function toggleLock(param) {
        locks[param] = !locks[param];
        let btn = document.querySelector(`.lock-btn[data-param="${param}"]`);
        if (locks[param]) { 
            btn.innerHTML = '🔒'; 
            btn.setAttribute('data-state','locked'); 
            if(param==='track') currentTrack = document.getElementById('trackValue').innerText; 
        }
        else { 
            btn.innerHTML = '🔓'; 
            btn.setAttribute('data-state','unlocked'); 
        }
    }

    // ИНИЦИАЛИЗАЦИЯ
    function init() {
        document.querySelectorAll('.lock-btn').forEach(btn => btn.addEventListener('click', (e) => { 
            e.stopPropagation(); 
            toggleLock(btn.getAttribute('data-param')); 
        }));
        
        document.getElementById('randomBtn').addEventListener('click', updateUnlockedOnly);
        document.getElementById('refreshSimilarBtn').addEventListener('click', refreshSimilarCars);
        
        if (carsDatabase.length > 0) {
            let initCar = getRandomItem(carsDatabase);
            if (initCar) {
                document.getElementById('carValue').innerText = initCar.name;
                document.getElementById('carIcon').src = initCar.icon;
                document.getElementById('carIcon').style.display = 'block';
                displaySimilarCars(initCar);
            }
        }
        
        if (tracks.length > 0) {
            let initTrack = tracks[0];
            currentTrack = initTrack;
            document.getElementById('trackValue').innerText = initTrack;
            let ic = getTrackIcon(initTrack);
            if(ic) { 
                document.getElementById('trackIcon').src = ic; 
                document.getElementById('trackIcon').style.display = 'block'; 
            }
            updateWeatherByTrack(initTrack);
            updateTimeByTrack(initTrack);
        } else {
            document.getElementById('trackValue').innerText = "Нет данных";
        }
    }
    
    init();
</script>
</body>
</html>

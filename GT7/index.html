<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GT7 Random Race</title>

    <link rel="apple-touch-icon" href="gt7.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-image: url('images/gt7images.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #eee;
            text-align: center;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }
        
        .container {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 44px;
            padding: 20px 18px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .result-card {
            background: rgba(5, 7, 15, 0);
            border-radius: 28px;
            padding: 16px 18px;
            margin: 12px 0;
            text-align: left;
            border: 1px solid rgba(51, 65, 85, 0.6);
        }
        
        .param-block {
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
            padding-bottom: 14px;
        }
        
        .param-block:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .param-header {
            display: grid;
            grid-template-columns: 50px 1fr;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        
        .lock-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .right-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            width: 100%;
        }
        
        .param-label {
            font-weight: 700;
            color: #ff4d4d;
            background: rgba(15, 23, 42, 0.8);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            letter-spacing: 1px;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            backdrop-filter: blur(2px);
        }
        
        .icon-container {
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            min-height: 60px;
            padding: 4px 0;
        }
        
        .car-icon, .track-icon {
            max-width: 100%;
            max-height: 120px;
            width: auto;
            height: auto;
            object-fit: contain;
        }
        
        /* НОВЫЕ СТИЛИ ДЛЯ ВРЕМЕНИ */
       .time-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
}

.time-text {
    flex: 1;                 /* ← главное изменение */
    text-align: left;
    white-space: normal;
    word-break: break-word;
}

.time-dynamic {
    text-align: right;
    white-space: nowrap;
    min-width: 55px;
    color: #ffffff;
    font-weight: 600;
}
        
        .param-value {
            font-size: 16px;
            font-weight: 600;
            color: #f1f5f9;
            line-height: 1.35;
            word-break: break-word;
            background: rgba(15, 23, 42, 0.6);
            padding: 10px 14px;
            border-radius: 20px;
            margin-top: 6px;
            backdrop-filter: blur(2px);
        }
        
        button.lock-btn {
            background: transparent !important;
            border: none !important;
            cursor: pointer !important;
            padding: 4px 6px !important;
            margin: 0 !important;
            width: auto !important;
            min-width: 36px !important;
            box-shadow: none !important;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        
        button.lock-btn img {
            width: 24px;
            height: 24px;
            display: block;
        }
        
        button.lock-btn:active {
            transform: scale(0.92);
        }
        
        button:not(.lock-btn) {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 17px;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            margin: 6px 4px;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(255,77,77,0.25);
        }
        
        button:not(.lock-btn):active {
            transform: scale(0.97);
            background: #e03a3a;
        }
        
        .btn-main {
            width: 100%;
            background: #ff4d4d;
            font-size: 18px;
            padding: 15px;
            margin-top: 8px;
        }
        
        @media (max-width: 390px) {
            body { padding: 12px; }
            .container { padding: 16px 14px; border-radius: 36px; }
            .result-card { padding: 12px 14px; }
            .param-header { grid-template-columns: 40px 1fr; gap: 6px; }
            .param-label { font-size: 12px; padding: 5px 12px; }
            .icon-container { min-height: 50px; }
            .car-icon, .track-icon { max-height: 100px; }
            .param-value { font-size: 14px; padding: 8px 12px; }
            .time-text { font-size: 13px; }
            flex: 1;
            .time-dynamic { font-size: 13px; min-width: 50px; }
            button.lock-btn img { width: 20px; height: 20px; }
            button:not(.lock-btn) { padding: 12px 16px; font-size: 16px; }
            .btn-main { font-size: 17px; padding: 13px; }
        }
        
        @media (max-width: 340px) {
            .param-header { grid-template-columns: 36px 1fr; gap: 4px; }
            .param-label { font-size: 11px; padding: 4px 10px; }
            .param-value { font-size: 13px; padding: 7px 10px; }
            .time-text { font-size: 12px; }
            .time-dynamic { font-size: 12px; min-width: 45px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="result-card">
            <!-- МАШИНА -->
            <div class="param-block">
                <div class="param-header">
                    <div class="lock-container">
                        <button class="lock-btn" id="lockCar">
                            <img src="unlocked.png" alt="Разблокировано">
                        </button>
                    </div>
                    <div class="right-content">
                        <span class="param-label">🏎️ МАШИНА</span>
                        <div class="icon-container">
                            <img class="car-icon" id="carIcon" src="" style="display: none;">
                        </div>
                    </div>
                </div>
                <div class="param-value" id="carValue">—</div>
            </div>
            
            <!-- ТРАССА -->
            <div class="param-block">
                <div class="param-header">
                    <div class="lock-container">
                        <button class="lock-btn" id="lockTrack">
                            <img src="unlocked.png" alt="Разблокировано">
                        </button>
                    </div>
                    <div class="right-content">
                        <span class="param-label">🛣️ ТРАССА</span>
                        <div class="icon-container">
                            <img class="track-icon" id="trackIcon" src="" style="display: none;">
                        </div>
                    </div>
                </div>
                <div class="param-value" id="trackValue">—</div>
            </div>
            
            <!-- ПОГОДА -->
            <div class="param-block">
                <div class="param-header">
                    <div class="lock-container">
                        <button class="lock-btn" id="lockWeather">
                            <img src="unlocked.png" alt="Разблокировано">
                        </button>
                    </div>
                    <div class="right-content">
                        <span class="param-label">🌦️ ПОГОДА</span>
                    </div>
                </div>
                <div class="param-value" id="weatherValue">—</div>
            </div>
            
            <!-- ВРЕМЯ (новая структура) -->
            <div class="param-block">
                <div class="param-header">
                    <div class="lock-container">
                        <button class="lock-btn" id="lockTime">
                            <img src="unlocked.png" alt="Разблокировано">
                        </button>
                    </div>
                    <div class="right-content">
                        <span class="param-label">⏰ ВРЕМЯ</span>
                    </div>
                </div>
                <div class="param-value time-row">
                    <span class="time-text" id="timeText">—</span>
                    <span class="time-dynamic" id="timeDynamic">—</span>
                </div>
            </div>
        </div>
        
        <button id="randomBtn" class="btn-main">🎲 СЛУЧАЙНАЯ ГОНКА</button>
    </div>

    <script>
        // ==================== ВРЕМЯ СУТОК ====================
        const timesBase = [
            "Ранний рассвет", "Рассвет", "Восход", "Раннее утро", "Утро",
            "Позднее утро", "День", "После полудня", "Полдень", "Ранний вечер",
            "Вечер", "Закат", "Сумерки", "Ночь", "Полночь"
        ];
        
        // ==================== МАШИНЫ (сокращённый список для примера) ====================
        const carIcons = {
            "Abarth 1500 Biposto Bertone B.A.T 1 '52": "car_icons/car1932.png",
            "Abarth 500 '09": "car_icons/car1973.png",
            "BMW M3 '07": "car_icons/car1399.png",
            "Nissan GT-R '17": "car_icons/car2167.png",
            "Porsche 911 GT3 RS '22": "car_icons/car3539.png"
        };
        const cars = Object.keys(carIcons);
        
        // ==================== ТРАССЫ ====================
        const tracksIcons = {
            "Франция Alsace - Деревня": "track_icons/bbe708-D-n15MKA.png",
            "Италия Autodrome Lago Maggiore - Восток": "track_icons/39f155-Dg_fFdVS.png",
            "США Blue Moon Bay Speedway": "track_icons/971481-BdMNGGxX.png",
            "Япония Tokyo Expressway - Восток": "track_icons/e9dd33-B7sGBTmw.png",
            "Германия Nürburgring Nordschleife": "track_icons/246f6d-B2a8UX0a.png"
        };
        const tracks = Object.keys(tracksIcons);
        
        // ==================== ПОГОДА ====================
        const weathers = [
            "S01 (Ясно, безоблачно)", "S02 (Ясно, малооблачно)", "S03 (Ясно, переменная облачность)",
            "C01 (Пасмурно, но ярко)", "C02 (Пасмурно, тепло)",
            "R01 (Мелкий дождь, морось)", "R02 (Умеренный дождь)", "R03 (Сильный дождь, ливень)"
        ];
        
        // ==================== СОСТОЯНИЕ БЛОКИРОВОК ====================
        let lockCar = false;
        let lockTrack = false;
        let lockWeather = false;
        let lockTime = false;
        
        // ==================== ДИНАМИКА ВРЕМЕНИ ====================
        function getRandomTimeDynamic() {
            return Math.floor(Math.random() * 30) + 1;
        }
        
        function getRandomItem(arr) {
            if (!arr || arr.length === 0) return "—";
            return arr[Math.floor(Math.random() * arr.length)];
        }
        
        // ==================== ФУНКЦИИ ОБНОВЛЕНИЯ ====================
        function updateCar(force = false) {
            if (!lockCar || force) {
                const car = getRandomItem(cars);
                const carElement = document.getElementById('carValue');
                if (carElement) carElement.textContent = car;
                const icon = document.getElementById('carIcon');
                if (icon && carIcons[car]) {
                    icon.src = carIcons[car];
                    icon.style.display = "block";
                    icon.onerror = () => { if(icon) icon.style.display = "none"; };
                } else if (icon) {
                    icon.style.display = "none";
                }
            }
        }
        
        function updateTrack(force = false) {
            if (!lockTrack || force) {
                const track = getRandomItem(tracks);
                const trackElement = document.getElementById('trackValue');
                if (trackElement) trackElement.textContent = track;
                const icon = document.getElementById('trackIcon');
                if (icon && tracksIcons[track]) {
                    icon.src = tracksIcons[track];
                    icon.style.display = "block";
                    icon.onerror = () => { if(icon) icon.style.display = "none"; };
                } else if (icon) {
                    icon.style.display = "none";
                }
            }
        }
        
        function updateWeather(force = false) {
            if (!lockWeather || force) {
                const weather = getRandomItem(weathers);
                const weatherElement = document.getElementById('weatherValue');
                if (weatherElement) weatherElement.textContent = weather;
            }
        }
        
        function updateTime(force = false) {
            if (!lockTime || force) {
                const time = getRandomItem(timesBase);
                const dynamic = getRandomTimeDynamic();
                const timeTextEl = document.getElementById('timeText');
                const timeDynamicEl = document.getElementById('timeDynamic');
                if (timeTextEl) timeTextEl.textContent = time;
                if (timeDynamicEl) timeDynamicEl.textContent = `(x${dynamic})`;
            }
        }
        
        function updateAll() {
            updateCar();
            updateTrack();
            updateWeather();
            updateTime();
        }
        
        // ==================== ОБНОВЛЕНИЕ ВИДА КНОПОК-ЗАМОЧКОВ ====================
        function updateLockButtons() {
            const carBtn = document.getElementById('lockCar');
            const trackBtn = document.getElementById('lockTrack');
            const weatherBtn = document.getElementById('lockWeather');
            const timeBtn = document.getElementById('lockTime');
            
            if (carBtn) carBtn.innerHTML = lockCar ? '<img src="locked.png" alt="Заблокировано">' : '<img src="unlocked.png" alt="Разблокировано">';
            if (trackBtn) trackBtn.innerHTML = lockTrack ? '<img src="locked.png" alt="Заблокировано">' : '<img src="unlocked.png" alt="Разблокировано">';
            if (weatherBtn) weatherBtn.innerHTML = lockWeather ? '<img src="locked.png" alt="Заблокировано">' : '<img src="unlocked.png" alt="Разблокировано">';
            if (timeBtn) timeBtn.innerHTML = lockTime ? '<img src="locked.png" alt="Заблокировано">' : '<img src="unlocked.png" alt="Разблокировано">';
        }
        
        // ==================== ОБРАБОТЧИКИ КНОПОК ====================
        const lockCarBtn = document.getElementById('lockCar');
        const lockTrackBtn = document.getElementById('lockTrack');
        const lockWeatherBtn = document.getElementById('lockWeather');
        const lockTimeBtn = document.getElementById('lockTime');
        const randomBtn = document.getElementById('randomBtn');
        
        if (lockCarBtn) lockCarBtn.addEventListener('click', () => { lockCar = !lockCar; updateLockButtons(); });
        if (lockTrackBtn) lockTrackBtn.addEventListener('click', () => { lockTrack = !lockTrack; updateLockButtons(); });
        if (lockWeatherBtn) lockWeatherBtn.addEventListener('click', () => { lockWeather = !lockWeather; updateLockButtons(); });
        if (lockTimeBtn) lockTimeBtn.addEventListener('click', () => { lockTime = !lockTime; updateLockButtons(); });
        if (randomBtn) randomBtn.addEventListener('click', updateAll);
        
        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        updateLockButtons();
        updateAll();
    </script>
</body>
</html>

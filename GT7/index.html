<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GT7 Random Race</title>

    <link rel="apple-touch-icon" href="gt7.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-image: url('https://static.wikia.nocookie.net/gran-turismo/images/6/69/GT7_Poster.jpg/revision/latest?cb=20210910231708');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #eee;
            text-align: center;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 30px 24px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .result-card {
            background: rgba(5, 7, 15, 0);
            border-radius: 28px;
            padding: 24px;
            margin: 20px 0;
            text-align: left;
            border: 1px solid #334155;
        }
        .param-block {
            margin-bottom: 24px;
            border-bottom: 1px solid #334155;
            padding-bottom: 16px;
        }
        .param-block:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .param-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .param-label {
            font-weight: 700;
            color: #ff4d4d;
            background: #0f172a;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            letter-spacing: 1px;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
        }
        .icon-container {
            flex: 1;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 0;
        }
        .car-icon, .track-icon {
            max-width: 100%;
            max-height: 128px;
            width: auto;
            height: auto;
            object-fit: contain;
        }
        .param-value {
            font-size: 20px;
            font-weight: 600;
            color: #f1f5f9;
            line-height: 1.4;
            word-break: break-word;
            background: #0f172a80;
            padding: 12px 16px;
            border-radius: 20px;
            margin-top: 8px;
        }
        /* Стили для кнопки-замочка */
        button.lock-btn {
            background: transparent !important;
            border: none !important;
            cursor: pointer !important;
            padding: 4px 8px !important;
            margin: 0 !important;
            width: auto !important;
            min-width: 40px !important;
            box-shadow: none !important;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        button.lock-btn img {
            width: 28px;
            height: 28px;
            display: block;
        }
        button.lock-btn:active {
            transform: scale(0.95);
        }
        /* Обычные кнопки (не замочки) */
        button:not(.lock-btn) {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            margin: 8px 6px;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 5px 15px rgba(255,77,77,0.2);
        }
        button:not(.lock-btn):active {
            transform: scale(0.96);
            background: #e03a3a;
        }
        .btn-main {
            width: 100%;
            background: #ff4d4d;
            font-size: 18px;
            padding: 16px;
        }
        @media (max-width: 480px) {
            .container { padding: 20px 16px; }
            .param-label { font-size: 12px; padding: 6px 12px; }
            .car-icon, .track-icon { max-height: 80px; }
            .param-value { font-size: 18px; padding: 10px 12px; }
            .icon-container { min-height: 40px; }
            button.lock-btn img { width: 22px; height: 22px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="result-card">
            <!-- МАШИНА -->
            <div class="param-block">
                <div class="param-header">
                    <span class="param-label">🏎️ МАШИНА</span>
                    <button class="lock-btn" id="lockCar">
                        <img src="unlocked.png" alt="Разблокировано">
                    </button>
                    <div class="icon-container">
                        <img class="car-icon" id="carIcon" src="" style="display: none;">
                    </div>
                </div>
                <div class="param-value" id="carValue">—</div>
            </div>
            
            <!-- ТРАССА -->
            <div class="param-block">
                <div class="param-header">
                    <span class="param-label">🛣️ ТРАССА</span>
                    <button class="lock-btn" id="lockTrack">
                        <img src="unlocked.png" alt="Разблокировано">
                    </button>
                    <div class="icon-container">
                        <img class="track-icon" id="trackIcon" src="" style="display: none;">
                    </div>
                </div>
                <div class="param-value" id="trackValue">—</div>
            </div>
            
            <!-- ПОГОДА -->
            <div class="param-block">
                <div class="param-header">
                    <span class="param-label">🌦️ ПОГОДА</span>
                    <button class="lock-btn" id="lockWeather">
                        <img src="unlocked.png" alt="Разблокировано">
                    </button>
                </div>
                <div class="param-value" id="weatherValue">—</div>
            </div>
            
            <!-- ВРЕМЯ -->
            <div class="param-block">
                <div class="param-header">
                    <span class="param-label">⏰ ВРЕМЯ</span>
                    <button class="lock-btn" id="lockTime">
                        <img src="unlocked.png" alt="Разблокировано">
                    </button>
                </div>
                <div class="param-value" id="timeValue">—</div>
            </div>
        </div>
        
        <button id="randomBtn" class="btn-main">🎲 СЛУЧАЙНАЯ ГОНКА</button>
    </div>

    <script>
        // ==================== ИКОНКИ МАШИН ====================
        const carIcons = {
            "Abarth 1500 Biposto Bertone B.A.T 1 '52": "car_icons/car1932.png",
            "Abarth 500 '09": "car_icons/car1973.png",
            "Abarth 595 SS '70": "car_icons/car3438.png",
            "AFEELA 1 '26": "car_icons/car3579.png",
            "AFEELA Prototype 2024": "car_icons/car3546.png",
            "Alfa Romeo 155 2.5 V6 TI '93": "car_icons/car365.png",
            "Alfa Romeo 4C '14": "car_icons/car2136.png",
            "Alfa Romeo 4C Gr.3": "car_icons/car3185.png"
        };
        const cars = Object.keys(carIcons);
        
        // ==================== ИКОНКИ ТРАСС ====================
        const tracksIcons = {
            "Франция Alsace - Деревня": "track_icons/bbe708-D-n15MKA.png",
            "Франция Alsace - Деревня (обратн.)": "track_icons/bbe708-D-n15MKA.png",
            "Франция Alsace - тестовая трасса": "track_icons/bbe708-D-n15MKA.png",
            "Франция Alsace - тестовая трасса (обратн.)": "track_icons/bbe708-D-n15MKA.png",
            "Италия Autodrome Lago Maggiore - Восток": "track_icons/39f155-Dg_fFdVS.png",
            "Италия Autodrome Lago Maggiore - Восток (обратн.)": "track_icons/39f155-Dg_fFdVS.png",
            "Италия Autodrome Lago Maggiore - Запад": "track_icons/39f155-Dg_fFdVS.png",
            "Италия Autodrome Lago Maggiore - Запад (обратн.)": "track_icons/39f155-Dg_fFdVS.png",
            "Италия Autodrome Lago Maggiore - Центр": "track_icons/39f155-Dg_fFdVS.png",
            "Италия Autodrome Lago Maggiore - Центр (обратн.)": "track_icons/39f155-Dg_fFdVS.png",
            "Италия Autodrome Lago Maggiore - восточная часть": "track_icons/39f155-Dg_fFdVS.png",
            "Италия Autodrome Lago Maggiore - восточная часть (обратн.)": "track_icons/39f155-Dg_fFdVS.png",
            "Италия Autodrome Lago Maggiore - западная часть": "track_icons/39f155-Dg_fFdVS.png",
            "Италия Autodrome Lago Maggiore - западная часть (обратн.)": "track_icons/39f155-Dg_fFdVS.png",
            "Италия Autodrome Lago Maggiore - полная трасса": "track_icons/39f155-Dg_fFdVS.png",
            "Италия Autodrome Lago Maggiore - полная трасса (обратн.)": "track_icons/39f155-Dg_fFdVS.png",
            "Италия Autodromo Nazionale Monza": "track_icons/f8bd64-VsJVPuq0.png",
            "Италия Autodromo Nazionale Monza (без шиканы)": "track_icons/f8bd64-VsJVPuq0.png"
        };
        const tracks = Object.keys(tracksIcons);
        
        // ==================== ПОГОДА ====================
        const weathers = [
            "S01 (Ясно, безоблачно)",
            "S02 (Ясно, малооблачно)",
            "R01 (Мелкий дождь)"
        ];
        
        // ==================== ВРЕМЯ СУТОК ====================
        const timesBase = [
            "Ранний рассвет",
            "Рассвет",
            "Восход",
            "День",
            "Вечер",
            "Закат",
            "Ночь"
        ];
        
        // ==================== СОСТОЯНИЕ БЛОКИРОВОК ====================
        let lockCar = false;
        let lockTrack = false;
        let lockWeather = false;
        let lockTime = false;
        
        // ==================== ДИНАМИКА ВРЕМЕНИ ====================
        function getRandomTimeDynamic() {
            return Math.floor(Math.random() * 30) + 1;
        }
        
        // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
        function getRandomItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }
        
        // ==================== ФУНКЦИИ ОБНОВЛЕНИЯ ====================
        function updateCar(force = false) {
            if (!lockCar || force) {
                const car = getRandomItem(cars);
                document.getElementById('carValue').textContent = car;
                const icon = document.getElementById('carIcon');
                if (carIcons[car]) {
                    icon.src = carIcons[car];
                    icon.style.display = "block";
                    icon.onerror = () => icon.style.display = "none";
                } else {
                    icon.style.display = "none";
                }
            }
        }
        
        function updateTrack(force = false) {
            if (!lockTrack || force) {
                const track = getRandomItem(tracks);
                document.getElementById('trackValue').textContent = track;
                const icon = document.getElementById('trackIcon');
                if (tracksIcons[track]) {
                    icon.src = tracksIcons[track];
                    icon.style.display = "block";
                    icon.onerror = () => icon.style.display = "none";
                } else {
                    icon.style.display = "none";
                }
            }
        }
        
        function updateWeather(force = false) {
            if (!lockWeather || force) {
                document.getElementById('weatherValue').textContent = getRandomItem(weathers);
            }
        }
        
        function updateTime(force = false) {
            if (!lockTime || force) {
                document.getElementById('timeValue').textContent = `${getRandomItem(timesBase)} (x${getRandomTimeDynamic()})`;
            }
        }
        
        function updateAll() {
            updateCar();
            updateTrack();
            updateWeather();
            updateTime();
        }
        
        // ==================== ОБНОВЛЕНИЕ ВИДА КНОПОК-ЗАМОЧКОВ ====================
        function updateLockButtons() {
            const carBtn = document.getElementById('lockCar');
            const trackBtn = document.getElementById('lockTrack');
            const weatherBtn = document.getElementById('lockWeather');
            const timeBtn = document.getElementById('lockTime');
            
            carBtn.innerHTML = lockCar 
                ? '<img src="locked.png" alt="Заблокировано">'
                : '<img src="unlocked.png" alt="Разблокировано">';
            
            trackBtn.innerHTML = lockTrack 
                ? '<img src="locked.png" alt="Заблокировано">'
                : '<img src="unlocked.png" alt="Разблокировано">';
            
            weatherBtn.innerHTML = lockWeather 
                ? '<img src="locked.png" alt="Заблокировано">'
                : '<img src="unlocked.png" alt="Разблокировано">';
            
            timeBtn.innerHTML = lockTime 
                ? '<img src="locked.png" alt="Заблокировано">'
                : '<img src="unlocked.png" alt="Разблокировано">';
        }
        
        // ==================== ОБРАБОТЧИКИ КНОПОК-ЗАМОЧКОВ ====================
        document.getElementById('lockCar').addEventListener('click', () => {
            lockCar = !lockCar;
            updateLockButtons();
        });
        
        document.getElementById('lockTrack').addEventListener('click', () => {
            lockTrack = !lockTrack;
            updateLockButtons();
        });
        
        document.getElementById('lockWeather').addEventListener('click', () => {
            lockWeather = !lockWeather;
            updateLockButtons();
        });
        
        document.getElementById('lockTime').addEventListener('click', () => {
            lockTime = !lockTime;
            updateLockButtons();
        });
        
        // ==================== ГЛАВНАЯ КНОПКА ====================
        document.getElementById('randomBtn').addEventListener('click', updateAll);
        
        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        updateLockButtons();
        updateAll();
    </script>
</body>
</html>

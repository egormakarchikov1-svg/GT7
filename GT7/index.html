<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>GT7 Random Race — Генератор гонки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a1a;
            color: #eee;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
            touch-action: pan-y pinch-zoom;
        }
        .container {
            background-image: url('images/gt7images.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(3px);
            z-index: 0;
        }
        .container > * {
            position: relative;
            z-index: 1;
        }
        .content {
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
        }
        .param-block {
            margin-bottom: 20px;
            padding: 12px 16px;
            background: rgba(10, 15, 30, 0.75);
            backdrop-filter: blur(5px);
            border-radius: 32px;
            border: 1px solid rgba(255,255,240,0.15);
            transition: all 0.2s;
        }
        .param-header {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .lock-container button {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 6px 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease;
        }
        .lock-container button:active {
            transform: scale(0.92);
        }
        .lock-container img {
            width: 30px;
            height: 30px;
            display: block;
        }
        .param-label {
            font-weight: 800;
            background: #ff4d4dcc;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 15px;
            letter-spacing: 1px;
            color: white;
            backdrop-filter: blur(2px);
        }
        .icon-container {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            min-height: 55px;
        }
        .car-icon {
            max-width: 100%;
            max-height: 70px;
            width: auto;
            object-fit: contain;
        }
        .track-icon {
            max-width: 100%;
            max-height: 60px;
            width: auto;
            object-fit: contain;
        }
        .param-value {
            font-size: 15px;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 14px;
            border-radius: 24px;
            margin-top: 6px;
            word-break: break-word;
            text-align: left;
            border-left: 3px solid #ff4d4d;
        }
        .locked-param .param-value {
            border-left-color: #4caf50;
            background: rgba(76, 175, 80, 0.15);
        }
        button:not(.lock-btn) {
            background: #ff4d4d;
            border: none;
            padding: 14px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 60px;
            width: 100%;
            color: white;
            transition: all 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.4);
            margin-top: 10px;
        }
        button:not(.lock-btn):active {
            transform: scale(0.97);
            background: #e03a3a;
        }
        @media (max-width: 480px) {
            .container { padding: 16px; }
            .param-label { font-size: 13px; padding: 5px 12px; }
            .param-value { font-size: 13px; padding: 8px 12px; }
            .car-icon { max-height: 55px; }
            .track-icon { max-height: 50px; }
            .lock-container img { width: 26px; height: 26px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="content">
        <div class="param-block" id="blockCar">
            <div class="param-header">
                <div class="lock-container"><button class="lock-btn" id="lockCar"><img id="lockCarImg" src="unlocked.png" alt="разблокировать"></button></div>
                <span class="param-label">🏎️ МАШИНА</span>
                <div class="icon-container"><img class="car-icon" id="carIcon" src="" style="display: none;"></div>
            </div>
            <div class="param-value" id="carValue">—</div>
        </div>

        <div class="param-block" id="blockTrack">
            <div class="param-header">
                <div class="lock-container"><button class="lock-btn" id="lockTrack"><img id="lockTrackImg" src="unlocked.png" alt="разблокировать"></button></div>
                <span class="param-label">🛣️ ТРАССА</span>
                <div class="icon-container"><img class="track-icon" id="trackIcon" src="" style="display: none;"></div>
            </div>
            <div class="param-value" id="trackValue">—</div>
        </div>

        <div class="param-block" id="blockWeather">
            <div class="param-header">
                <div class="lock-container"><button class="lock-btn" id="lockWeather"><img id="lockWeatherImg" src="unlocked.png" alt="разблокировать"></button></div>
                <span class="param-label">🌦️ ПОГОДА</span>
            </div>
            <div class="param-value" id="weatherValue">—</div>
        </div>

        <div class="param-block" id="blockTime">
            <div class="param-header">
                <div class="lock-container"><button class="lock-btn" id="lockTime"><img id="lockTimeImg" src="unlocked.png" alt="разблокировать"></button></div>
                <span class="param-label">⏰ ВРЕМЯ СУТОК</span>
            </div>
            <div class="param-value" id="timeValue">—</div>
        </div>

        <button id="randomBtn">🎲 СЛУЧАЙНАЯ ГОНКА</button>
    </div>
</div>

<script>
    (function() {
        // ==================== ТРАССЫ (пример с разными погодными условиями) ====================
        const fullTracksList = [
            // S01-C06 — только сухая погода (без дождя)
            { name: "Франция Alsace - Деревня", icon: "track_icons/bbe708-D-n15MKA.png", weatherType: "S01-C06", timeOptions: ["Рассвет","Восход","Раннее утро","Позднее утро","День","Вечер","Закат","Сумерки","Ночь"] },
            { name: "Италия Autodrome Lago Maggiore - Восток", icon: "track_icons/39f155-Dg_fFdVS.png", weatherType: "S01-C06", timeOptions: ["Восход","Раннее утро","Позднее утро","День","Вечер","Закат","Сумерки"] },
            { name: "Италия Autodromo Nazionale Monza", icon: "track_icons/f8bd64-VsJVPuq0.png", weatherType: "S01-C06", timeOptions: ["Ранее утро","Позднее утро","Вечер","Закат"] },
            { name: "США Blue Moon Bay Speedway", icon: "track_icons/971481-BdMNGGxX.png", weatherType: "S01-C06", timeOptions: ["Рассвет","Восход","Раннее утро","Позднее утро","День","Вечер","Закат","Сумерки","Ночь"] },
            { name: "Великобритания Brands Hatch - Grand Prix Circuit", icon: "track_icons/f3d2aa-Bznbpc1M.png", weatherType: "S01-C06", timeOptions: ["Ранее утро","Позднее утро","день","Вечер","Закат"] },
            
            // S01-R08 — поддерживается любая погода (включая дождь)
            { name: "Япония Autopolis International Racing Course", icon: "track_icons/8d9953-CpR-SgHS.png", weatherType: "S01-R08", timeOptions: ["Рассвет","Восход","Раннее утро","Позднее утро","День","Вечер","Закат","Сумерки","Ночь"] },
            { name: "Франция Circuit de Spa-Francorchamps", icon: "track_icons/000971-B75flT8v.png", weatherType: "S01-R08", timeOptions: ["Заря","Рассвет","Восход","Ранее утро","Позднее утро","День","Вечер","Закат","Сумерки","ночь","полночь"] },
            { name: "Германия Nürburgring Nordschleife", icon: "track_icons/246f6d-B2a8UX0a.png", weatherType: "S01-R08", timeOptions: ["Восход","Раннее утро","Позднее утро","День","Вечер","Закат","Сумерки"] },
            { name: "Япония Fuji International Speedway", icon: "track_icons/664e17-DkicWsJ5.png", weatherType: "S01-R08", timeOptions: ["День","вечер","закат"] },
            { name: "Бельгия Spa (24 часа)", icon: "track_icons/000971-B75flT8v.png", weatherType: "S01-R08", timeOptions: ["Заря","Рассвет","Восход","Ранее утро","Позднее утро","День","Вечер","Закат","Сумерки","ночь","полночь"] }
        ];

        // ==================== МАШИНЫ ====================
        const carIcons = {
            "Abarth 1500 Biposto Bertone B.A.T 1 '52": "car_icons/car1932.png",
            "Abarth 500 '09": "car_icons/car1973.png",
            "BMW M3 '07": "car_icons/car1399.png",
            "Nissan GT-R '17": "car_icons/car2167.png",
            "Porsche 911 GT3 RS '22": "car_icons/car3539.png",
            "Ferrari 488 GTB '19": "car_icons/ferrari488.png",
            "Lamborghini Huracan GT3": "car_icons/lambo.png",
            "Mercedes-AMG GT R '20": "car_icons/amggt.png",
            "Audi R8 LMS Evo": "car_icons/audir8.png"
        };
        const cars = Object.keys(carIcons);
        
        // ==================== ПОГОДА ====================
        // Сухая погода (C01-C06 и S01-S03)
        const dryWeather = [
            "S01 (Ясно, безоблачно)", "S02 (Ясно, малооблачно)", "S03 (Ясно, переменная облачность)",
            "C01 (Пасмурно, но ярко)", "C02 (Пасмурно, тепло)", "C03 (Пасмурно, свежо)",
            "C04 (Облачно, сухо)", "C05 (Серое небо)", "C06 (Туманно, сухо)"
        ];
        
        // Дождливая погода (добавляется только для S01-R08)
        const rainWeather = [
            "R01 (Мелкий дождь, морось)", "R02 (Умеренный дождь)", "R03 (Сильный дождь, ливень)"
        ];
        
        // Полная погода (с дождём)
        const fullWeather = [...dryWeather, ...rainWeather];
        
        // Функция выбора погоды в зависимости от типа трассы
        function getWeatherByType(weatherType) {
            const pool = weatherType === "S01-R08" ? fullWeather : dryWeather;
            return pool[Math.floor(Math.random() * pool.length)];
        }
        
        // Динамический множитель времени (1-30)
        function getRandomMultiplier() {
            return Math.floor(Math.random() * 30) + 1;
        }
        
        // ==================== СОСТОЯНИЕ ====================
        let lockCar = false;
        let lockTrack = false;
        let lockWeather = false;
        let lockTime = false;
        
        let currentCar = "";
        let currentTrack = null;
        let currentWeather = "";
        let currentTimeOption = "";
        
        // ==================== ФУНКЦИИ ГЕНЕРАЦИИ ====================
        function randomCar() {
            return cars[Math.floor(Math.random() * cars.length)];
        }
        
        function randomTrack() {
            return fullTracksList[Math.floor(Math.random() * fullTracksList.length)];
        }
        
        function randomTimeFromTrack(track) {
            const options = track.timeOptions;
            return options.length ? options[Math.floor(Math.random() * options.length)] : "День";
        }
        
        // ==================== ОБНОВЛЕНИЕ ИНТЕРФЕЙСА ====================
        function updateDisplay() {
            // Обновляем текстовые значения
            const carValueEl = document.getElementById('carValue');
            const trackValueEl = document.getElementById('trackValue');
            const weatherValueEl = document.getElementById('weatherValue');
            const timeValueEl = document.getElementById('timeValue');
            
            if (carValueEl) carValueEl.textContent = currentCar;
            if (trackValueEl && currentTrack) trackValueEl.textContent = currentTrack.name;
            if (weatherValueEl) weatherValueEl.textContent = currentWeather;
            
            // Время с множителем
            const multiplier = getRandomMultiplier();
            if (timeValueEl) {
                timeValueEl.innerHTML = `${currentTimeOption} <span style="opacity:0.7; font-size:0.75rem;">(x${multiplier})</span>`;
            }
            
            // Иконка машины
            const carIconEl = document.getElementById('carIcon');
            if (carIconEl && carIcons[currentCar]) {
                carIconEl.src = carIcons[currentCar];
                carIconEl.style.display = "block";
                carIconEl.onerror = () => { if(carIconEl) carIconEl.style.display = "none"; };
            } else if (carIconEl) {
                carIconEl.style.display = "none";
            }
            
            // Иконка трассы
            const trackIconEl = document.getElementById('trackIcon');
            if (trackIconEl && currentTrack?.icon) {
                trackIconEl.src = currentTrack.icon;
                trackIconEl.style.display = "block";
                trackIconEl.onerror = () => { if(trackIconEl) trackIconEl.style.display = "none"; };
            } else if (trackIconEl) {
                trackIconEl.style.display = "none";
            }
            
            // Визуальная индикация заблокированных блоков
            const carBlock = document.getElementById('blockCar');
            const trackBlock = document.getElementById('blockTrack');
            const weatherBlock = document.getElementById('blockWeather');
            const timeBlock = document.getElementById('blockTime');
            
            if (carBlock) carBlock.classList.toggle('locked-param', lockCar);
            if (trackBlock) trackBlock.classList.toggle('locked-param', lockTrack);
            if (weatherBlock) weatherBlock.classList.toggle('locked-param', lockWeather);
            if (timeBlock) timeBlock.classList.toggle('locked-param', lockTime);
        }
        
        // Обновление иконок замков
        function updateLockIcons() {
            const lockCarImg = document.getElementById('lockCarImg');
            const lockTrackImg = document.getElementById('lockTrackImg');
            const lockWeatherImg = document.getElementById('lockWeatherImg');
            const lockTimeImg = document.getElementById('lockTimeImg');
            
            if (lockCarImg) lockCarImg.src = lockCar ? "locked.png" : "unlocked.png";
            if (lockTrackImg) lockTrackImg.src = lockTrack ? "locked.png" : "unlocked.png";
            if (lockWeatherImg) lockWeatherImg.src = lockWeather ? "locked.png" : "unlocked.png";
            if (lockTimeImg) lockTimeImg.src = lockTime ? "locked.png" : "unlocked.png";
        }
        
        // ==================== ГЛАВНАЯ ФУНКЦИЯ ОБНОВЛЕНИЯ ====================
        // forceRandom — принудительно обновить все незаблокированные параметры
        function refreshAll(forceRandom = true) {
            // Машина
            if (!lockCar || forceRandom) {
                currentCar = randomCar();
            }
            
            // Трасса (если разблокирована или принудительно)
            if (!lockTrack || forceRandom) {
                currentTrack = randomTrack();
            }
            
            // Погода (зависит от текущей трассы)
            if (!lockWeather || forceRandom) {
                if (currentTrack) {
                    currentWeather = getWeatherByType(currentTrack.weatherType);
                } else {
                    currentWeather = dryWeather[0];
                }
            }
            
            // Время суток (зависит от текущей трассы)
            if (!lockTime || forceRandom) {
                if (currentTrack) {
                    currentTimeOption = randomTimeFromTrack(currentTrack);
                } else {
                    currentTimeOption = "День";
                }
            }
            
            updateDisplay();
        }
        
        // Обновление только разблокированных параметров (без принудительного обновления всех)
        function refreshUnlockedOnly() {
            // Машина — только если не заблокирована
            if (!lockCar) {
                currentCar = randomCar();
            }
            
            // Трасса — только если не заблокирована
            if (!lockTrack) {
                currentTrack = randomTrack();
            }
            
            // Погода — только если не заблокирована (зависит от текущей трассы)
            if (!lockWeather && currentTrack) {
                currentWeather = getWeatherByType(currentTrack.weatherType);
            }
            
            // Время — только если не заблокировано (зависит от текущей трассы)
            if (!lockTime && currentTrack) {
                currentTimeOption = randomTimeFromTrack(currentTrack);
            }
            
            updateDisplay();
        }
        
        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        function init() {
            // Начальная генерация
            currentCar = randomCar();
            currentTrack = randomTrack();
            currentWeather = getWeatherByType(currentTrack.weatherType);
            currentTimeOption = randomTimeFromTrack(currentTrack);
            updateDisplay();
            updateLockIcons();
            
            // Обработчики кнопок замков
            const lockCarBtn = document.getElementById('lockCar');
            const lockTrackBtn = document.getElementById('lockTrack');
            const lockWeatherBtn = document.getElementById('lockWeather');
            const lockTimeBtn = document.getElementById('lockTime');
            const randomBtn = document.getElementById('randomBtn');
            
            if (lockCarBtn) {
                lockCarBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    lockCar = !lockCar;
                    updateLockIcons();
                    updateDisplay(); // Обновляем визуальную индикацию блокировки
                });
            }
            
            if (lockTrackBtn) {
                lockTrackBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    lockTrack = !lockTrack;
                    updateLockIcons();
                    updateDisplay();
                });
            }
            
            if (lockWeatherBtn) {
                lockWeatherBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    lockWeather = !lockWeather;
                    updateLockIcons();
                    updateDisplay();
                });
            }
            
            if (lockTimeBtn) {
                lockTimeBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    lockTime = !lockTime;
                    updateLockIcons();
                    updateDisplay();
                });
            }
            
            // Кнопка случайной гонки — обновляем только НЕзаблокированные параметры
            if (randomBtn) {
                randomBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    refreshUnlockedOnly();
                });
            }
        }
        
        // Запуск после загрузки DOM
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
</script>
</body>
</html>

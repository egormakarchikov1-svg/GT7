<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GT7 Random Race</title>

    <link rel="apple-touch-icon" href="gt7.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-image: url('https://static.wikia.nocookie.net/gran-turismo/images/6/69/GT7_Poster.jpg/revision/latest?cb=20210910231708');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #eee;
            text-align: center;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Основной контейнер — адаптирован под iPhone 11 (375pt) */
        .container {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 44px;
            padding: 20px 18px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .result-card {
            background: rgba(5, 7, 15, 0);
            border-radius: 28px;
            padding: 16px 18px;
            margin: 12px 0;
            text-align: left;
            border: 1px solid rgba(51, 65, 85, 0.6);
        }
        
        .param-block {
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
            padding-bottom: 14px;
        }
        
        .param-block:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .param-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .param-label {
            font-weight: 700;
            color: #ff4d4d;
            background: rgba(15, 23, 42, 0.8);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            letter-spacing: 1px;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            backdrop-filter: blur(2px);
        }
        
        .icon-container {
            flex: 1;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            min-height: 44px;
            padding: 0;
        }
        
        .car-icon, .track-icon {
            max-width: 100%;
            max-height: 150px;
            width: auto;
            height: auto;
            object-fit: contain;
        }
        
        .param-value {
            font-size: 16px;
            font-weight: 600;
            color: #f1f5f9;
            line-height: 1.35;
            word-break: break-word;
            background: rgba(15, 23, 42, 0.6);
            padding: 10px 14px;
            border-radius: 20px;
            margin-top: 6px;
            backdrop-filter: blur(2px);
        }
        
        /* Кнопка-замочек */
        button.lock-btn {
            background: transparent !important;
            border: none !important;
            cursor: pointer !important;
            padding: 4px 6px !important;
            margin: 0 !important;
            width: auto !important;
            min-width: 36px !important;
            box-shadow: none !important;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        
        button.lock-btn img {
            width: 24px;
            height: 24px;
            display: block;
        }
        
        button.lock-btn:active {
            transform: scale(0.92);
        }
        
        /* Обычные кнопки */
        button:not(.lock-btn) {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 17px;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            margin: 6px 4px;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(255,77,77,0.25);
        }
        
        button:not(.lock-btn):active {
            transform: scale(0.97);
            background: #e03a3a;
        }
        
        .btn-main {
            width: 100%;
            background: #ff4d4d;
            font-size: 18px;
            padding: 15px;
            margin-top: 8px;
        }
        
        /* Адаптация для небольших экранов (iPhone SE, iPhone 11 в портрете) */
        @media (max-width: 390px) {
            body { padding: 12px; }
            .container { padding: 16px 14px; border-radius: 36px; }
            .result-card { padding: 12px 14px; }
            .param-label { font-size: 12px; padding: 5px 12px; }
            .car-icon, .track-icon { max-height: 150px; }
            .param-value { font-size: 14px; padding: 8px 12px; }
            button.lock-btn img { width: 20px; height: 20px; }
            button:not(.lock-btn) { padding: 12px 16px; font-size: 16px; }
            .btn-main { font-size: 17px; padding: 13px; }
        }
        
        /* Для очень маленьких экранов */
        @media (max-width: 340px) {
            .param-label { font-size: 11px; padding: 4px 10px; }
            .param-value { font-size: 13px; padding: 7px 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="result-card">
            <!-- МАШИНА -->
            <div class="param-block">
                <div class="param-header">
                    <span class="param-label">🏎️ МАШИНА</span>
                    <button class="lock-btn" id="lockCar">
                        <img src="unlocked.png" alt="Разблокировано">
                    </button>
                    <div class="icon-container">
                        <img class="car-icon" id="carIcon" src="" style="display: none;">
                    </div>
                </div>
                <div class="param-value" id="carValue">—</div>
            </div>
            
            <!-- ТРАССА -->
            <div class="param-block">
                <div class="param-header">
                    <span class="param-label">🛣️ ТРАССА</span>
                    <button class="lock-btn" id="lockTrack">
                        <img src="unlocked.png" alt="Разблокировано">
                    </button>
                    <div class="icon-container">
                        <img class="track-icon" id="trackIcon" src="" style="display: none;">
                    </div>
                </div>
                <div class="param-value" id="trackValue">—</div>
            </div>
            
            <!-- ПОГОДА -->
            <div class="param-block">
                <div class="param-header">
                    <span class="param-label">🌦️ ПОГОДА</span>
                    <button class="lock-btn" id="lockWeather">
                        <img src="unlocked.png" alt="Разблокировано">
                    </button>
                </div>
                <div class="param-value" id="weatherValue">—</div>
            </div>
            
            <!-- ВРЕМЯ -->
            <div class="param-block">
                <div class="param-header">
                    <span class="param-label">⏰ ВРЕМЯ</span>
                    <button class="lock-btn" id="lockTime">
                        <img src="unlocked.png" alt="Разблокировано">
                    </button>
                </div>
                <div class="param-value" id="timeValue">—</div>
            </div>
        </div>
        
        <button id="randomBtn" class="btn-main">🎲 СЛУЧАЙНАЯ ГОНКА</button>
    </div>

    <script>
        // ==================== ТЕСТОВЫЕ ДАННЫЕ (сокращённые) ====================
        
        // МАШИНЫ (10 тестовых для примера)
        const carIcons = {
            "Abarth 1500 Biposto Bertone B.A.T 1 '52": "car_icons/car1932.png",
            "Abarth 500 '09": "car_icons/car1973.png",
            "BMW M3 '07": "car_icons/car1399.png",
            "Nissan GT-R '17": "car_icons/car2167.png",
            "Porsche 911 GT3 RS '22": "car_icons/car3539.png",
            "Ferrari 488 GTB '15": "car_icons/car2171.png",
            "Lamborghini Huracán '15": "car_icons/car2171.png",
            "Audi R8 V10 '16": "car_icons/car3412.png",
            "Mercedes-AMG GT R '17": "car_icons/car3416.png",
            "McLaren 720S '17": "car_icons/car2174.png"
        };
        const cars = Object.keys(carIcons);
        
        // ТРАССЫ (10 тестовых)
        const tracksIcons = {
            "Франция Alsace - Деревня": "track_icons/bbe708-D-n15MKA.png",
            "Италия Autodrome Lago Maggiore - Восток": "track_icons/39f155-Dg_fFdVS.png",
            "США Blue Moon Bay Speedway": "track_icons/971481-BdMNGGxX.png",
            "Япония Tokyo Expressway - Восток": "track_icons/e9dd33-B7sGBTmw.png",
            "Германия Nürburgring Nordschleife": "track_icons/246f6d-B2a8UX0a.png",
            "Бельгия Circuit de Spa-Francorchamps": "track_icons/000971-B75flT8v.png",
            "Великобритания Brands Hatch GP": "track_icons/f3d2aa-Bznbpc1M.png",
            "Италия Autodromo Nazionale Monza": "track_icons/f8bd64-VsJVPuq0.png",
            "Япония Suzuka Circuit": "track_icons/fd167d-J52xhRm4.png",
            "США WeatherTech Raceway Laguna Seca": "track_icons/c75e61-DBxJ7RQM.png"
        };
        const tracks = Object.keys(tracksIcons);
        
        // ПОГОДА (основные типы)
        const weathers = [
            "S01 (Ясно, безоблачно)",
            "S02 (Ясно, малооблачно)",
            "S03 (Ясно, переменная облачность)",
            "C01 (Пасмурно, но ярко)",
            "C02 (Пасмурно, тепло)",
            "R01 (Мелкий дождь, морось)",
            "R02 (Умеренный дождь)",
            "R03 (Сильный дождь, ливень)"
        ];
        
        // ВРЕМЯ СУТОК
        const timesBase = [
            "Ранний рассвет",
            "Рассвет",
            "Восход",
            "Утро",
            "День",
            "Вечер",
            "Закат",
            "Сумерки",
            "Ночь",
            "Полночь"
        ];
        
        // ==================== СОСТОЯНИЕ БЛОКИРОВОК ====================
        let lockCar = false;
        let lockTrack = false;
        let lockWeather = false;
        let lockTime = false;
        
        // ==================== ДИНАМИКА ВРЕМЕНИ ====================
        function getRandomTimeDynamic() {
            return Math.floor(Math.random() * 30) + 1;
        }
        
        // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
        function getRandomItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }
        
        // ==================== ФУНКЦИИ ОБНОВЛЕНИЯ ====================
        function updateCar(force = false) {
            if (!lockCar || force) {
                const car = getRandomItem(cars);
                document.getElementById('carValue').textContent = car;
                const icon = document.getElementById('carIcon');
                if (carIcons[car]) {
                    icon.src = carIcons[car];
                    icon.style.display = "block";
                    icon.onerror = () => icon.style.display = "none";
                } else {
                    icon.style.display = "none";
                }
            }
        }
        
        function updateTrack(force = false) {
            if (!lockTrack || force) {
                const track = getRandomItem(tracks);
                document.getElementById('trackValue').textContent = track;
                const icon = document.getElementById('trackIcon');
                if (tracksIcons[track]) {
                    icon.src = tracksIcons[track];
                    icon.style.display = "block";
                    icon.onerror = () => icon.style.display = "none";
                } else {
                    icon.style.display = "none";
                }
            }
        }
        
        function updateWeather(force = false) {
            if (!lockWeather || force) {
                document.getElementById('weatherValue').textContent = getRandomItem(weathers);
            }
        }
        
        function updateTime(force = false) {
            if (!lockTime || force) {
                document.getElementById('timeValue').textContent = `${getRandomItem(timesBase)} (x${getRandomTimeDynamic()})`;
            }
        }
        
        function updateAll() {
            updateCar();
            updateTrack();
            updateWeather();
            updateTime();
        }
        
        // ==================== ОБНОВЛЕНИЕ ВИДА КНОПОК-ЗАМОЧКОВ ====================
        function updateLockButtons() {
            const carBtn = document.getElementById('lockCar');
            const trackBtn = document.getElementById('lockTrack');
            const weatherBtn = document.getElementById('lockWeather');
            const timeBtn = document.getElementById('lockTime');
            
            carBtn.innerHTML = lockCar 
                ? '<img src="locked.png" alt="Заблокировано">'
                : '<img src="unlocked.png" alt="Разблокировано">';
            
            trackBtn.innerHTML = lockTrack 
                ? '<img src="locked.png" alt="Заблокировано">'
                : '<img src="unlocked.png" alt="Разблокировано">';
            
            weatherBtn.innerHTML = lockWeather 
                ? '<img src="locked.png" alt="Заблокировано">'
                : '<img src="unlocked.png" alt="Разблокировано">';
            
            timeBtn.innerHTML = lockTime 
                ? '<img src="locked.png" alt="Заблокировано">'
                : '<img src="unlocked.png" alt="Разблокировано">';
        }
        
        // ==================== ОБРАБОТЧИКИ КНОПОК ====================
        document.getElementById('lockCar').addEventListener('click', () => {
            lockCar = !lockCar;
            updateLockButtons();
        });
        
        document.getElementById('lockTrack').addEventListener('click', () => {
            lockTrack = !lockTrack;
            updateLockButtons();
        });
        
        document.getElementById('lockWeather').addEventListener('click', () => {
            lockWeather = !lockWeather;
            updateLockButtons();
        });
        
        document.getElementById('lockTime').addEventListener('click', () => {
            lockTime = !lockTime;
            updateLockButtons();
        });
        
        document.getElementById('randomBtn').addEventListener('click', updateAll);
        
        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        updateLockButtons();
        updateAll();
    </script>
</body>
</html>

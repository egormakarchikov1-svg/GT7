<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>GT7 Random Race - Блокировка параметров 🔒</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-image: url('https://static.wikia.nocookie.net/gran-turismo/images/6/69/GT7_Poster.jpg/revision/latest?cb=20210910231708');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #eee;
            text-align: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        
        .container {
            background: rgba(30, 41, 59, 0.75);
            backdrop-filter: blur(5px);
            border-radius: 32px;
            padding: 16px 14px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 10px 25px rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .result-card {
            background: rgba(5, 7, 15, 0);
            border-radius: 20px;
            padding: 8px;
            margin: 0 0 12px 0;
            text-align: center;
            border: 1px solid #334155;
        }
        
        /* Сетка для параметров - 4 колонки на больших экранах */
        .params-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        
        .param-block {
            margin-bottom: 0;
            text-align: center;
        }

        
        /* Заголовок с иконкой и текстом сверху */
        .param-label {
            font-weight: 700;
            color: #ff4d4d;
            background: #0f172a;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        /* Стили для иконок заголовков */
        .header-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        
        /* Контейнер для больших иконок (машина/трасса) */
        .icon-container {
            background: transparent;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100px;
            padding: 0;
            margin-bottom: 10px;
        }
        
        /* Контейнер для иконок погоды и времени (одинаковый размер) */
        .weather-icon-container, .time-icon-container {
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100px;
            margin-bottom: 10px;
        }
        
        .car-icon, .track-icon {
            max-width: 100%;
            max-height: 100px;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 0;
        }
        
        /* Иконки для погоды и времени */
        .weather-display-icon, .time-display-icon {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border-radius: 0;
        }
        
        .param-value {
            font-size: 14px;
            font-weight: 600;
            color: #f1f5f9;
            line-height: 1.4;
            word-break: break-word;
            background: #0f172a80;
            padding: 10px 12px;
            border-radius: 20px;
            margin-top: 8px;
        }
        
        button {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 60;
            border-radius: 60px;
            cursor: pointer;
            margin: 8px 6px;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 5px 15px rgba(255,77,77,0.2);
        }
        
        button:active {
            transform: scale(0.96);
            background: #e03a3a;
        }
        
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 20px 0 10px;
        }
        
        .btn-group button {
            flex: 1;
            min-width: 120px;
            background: #334155;
            box-shadow: none;
        }
        
        .btn-group button:active {
            background: #475569;
        }
        
        .btn-main {
    width: auto;           /* Изменено с 100% на auto */
    min-width: 900px;      /* Минимальная ширина */
    background: #ff4d4d;
    font-size: 30px;       /* Уменьшен с 18px */
    padding: 10px 20px;    /* Уменьшен с 16px */
    display: inline-flex;  /* Добавлено для центрирования */
    margin: 8px auto;      /* Центрирование кнопки */
}
        
        .btn-icon {
            vertical-align: middle;
            margin-right: 6px;
            filter: brightness(0) invert(1);
        }
        
        .btn-group .btn-icon {
            filter: none;
        }
        
        .footer {
            font-size: 11px;
            color: #475569;
            margin-top: 20px;
        }
        
        /* Адаптация для планшета 1920x1200 (альбомная) */
        @media (min-width: 1200px) and (orientation: landscape) {
            body {
                padding: 60px;
            }
            
            .container {
                max-width: 1200px;
                padding: 50px 45px;
            }
            
            .params-grid {
                gap: 30px;
            }
            
            .param-value {
                font-size: 16px;
                padding: 12px 16px;
            }
            
            .car-icon, .track-icon {
                max-height: 120px;
            }
            
            .weather-display-icon, .time-display-icon {
                width: 100px;
                height: 100px;
            }
            
            .btn-group button {
                min-width: 140px;
                font-size: 18px;
            }
            
            .btn-main {
                font-size: 20px;
                padding: 18px;
            }
            
            .header-icon {
                width: 28px;
                height: 28px;
            }
        }
        
        /* Для планшетов в альбомной ориентации */
        @media (max-width: 1024px) and (orientation: landscape) {
            .container {
                max-width: 95%;
                padding: 30px 25px;
            }
            
            .params-grid {
                gap: 15px;
            }
            
            .param-value {
                font-size: 12px;
            }
            
            .header-icon {
                width: 20px;
                height: 20px;
            }
            
            .weather-display-icon, .time-display-icon {
                width: 60px;
                height: 60px;
            }
        }
        
        /* Для вертикальной ориентации - 2 колонки */
        @media (orientation: portrait) and (max-width: 1024px) {
            .params-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
        }
        
        /* Для мобильных устройств - 1 колонка */
        @media (max-width: 768px) {
            body {
                padding: 20px;
            }
            
            .container {
                padding: 20px 16px;
            }
            
            .params-grid {
                grid-template-columns: 1fr;
                gap: 25px;
            }
            
            .header-icon {
                width: 22px;
                height: 22px;
            }
            
            .car-icon, .track-icon {
                max-height: 100px;
            }
            
            .weather-display-icon, .time-display-icon {
                width: 70px;
                height: 70px;
            }
            
            .param-value {
                font-size: 14px;
                padding: 10px 12px;
            }
            
            .icon-container {
                min-height: 80px;
            }
        }
    </style>
</head>

<div class="container">
    <div class="result-card">
        <div class="params-grid">
            <!-- Блок МАШИНА -->
            <div class="param-block" id="carBlock" data-param="car">
                <button class="lock-btn" data-param="car">🔓</button>
                <div class="param-label">
                    <img src="https://icon666.com/r/_thumb/5n4/5n4sw8dq05bd_64.png" class="header-icon" alt="car">
                    <span>МАШИНА</span>
                </div>
                <div class="icon-container">
                    <img class="car-icon" id="carIcon" src="" alt="Иконка" style="display: none;">
                </div>
                <div class="param-value" id="carValue">—</div>
            </div>
            
            <!-- Блок ТРАССА -->
            <div class="param-block" id="trackBlock" data-param="track">
                <button class="lock-btn" data-param="track">🔓</button>
                <div class="param-label">
                    <img src="https://icon666.com/r/_thumb/n7u/n7ukbjy24azf_64.png" class="header-icon" alt="track">
                    <span>ТРАССА</span>
                </div>
                <div class="icon-container">
                    <img class="track-icon" id="trackIcon" src="" alt="Иконка" style="display: none;">
                </div>
                <div class="param-value" id="trackValue">—</div>
            </div>
            
            <!-- Блок ПОГОДА -->
            <div class="param-block" id="weatherBlock" data-param="weather">
                <button class="lock-btn" data-param="weather">🔓</button>
                <div class="param-label">
                    <img src="https://images.icon-icons.com/1603/PNG/96/weather-forcast-storm-rain-thunder-day_108615.png" class="header-icon" alt="weather">
                    <span>ПОГОДА</span>
                </div>
                <div class="weather-icon-container">
                    <img src="https://cdn-icons-png.flaticon.com/512/3222/3222803.png" class="weather-display-icon" id="weatherIcon" alt="Погода">
                </div>
                <div class="param-value" id="weatherValue">—</div>
            </div>
            
            <!-- Блок ВРЕМЯ -->
            <div class="param-block" id="timeBlock" data-param="time">
                <button class="lock-btn" data-param="time">🔓</button>
                <div class="param-label">
                    <img src="https://images.icon-icons.com/3780/PNG/96/clock_timer_calendar_alarm_date_schedule_hour_watch_stopwatch_time_icon_231897.png" class="header-icon" alt="time">
                    <span>ВРЕМЯ</span>
                </div>
                <div class="time-icon-container">
                    <img src="https://cdn-icons-png.flaticon.com/512/2624/2624160.png" class="time-display-icon" id="timeIcon" alt="Время">
                </div>
                <div class="param-value" id="timeValue">—</div>
            </div>
        </div>
    </div>
    
    <!-- Основная кнопка -->
    <div style="text-align: center;">
    <button id="randomBtn" class="btn-main">
        <img src="https://img.icons8.com/?size=80&id=raY4YhlfR3SI&format=png" class="btn-icon" alt="dice" style="filter: none !important; width: 1.4em; height: 1.4em;"> 
        СЛУЧАЙНАЯ ГОНКА
    </button>
</div>
    
       
    <div class="footer">
        🔒 Нажмите на замочек в углу карточки — параметр заблокируется<br>
        При нажатии «Случайная гонка» изменятся только НЕзаблокированные параметры
    </div>
</div>

               // ------------------- СОСТОЯНИЯ БЛОКИРОВКИ -------------------
    const locks = {
        car: false,
        track: false,
        weather: false,
        time: false
    };
    
    // ------------------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ -------------------
    function getRandomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    
    function getCarIcon(carName) { return carIcons[carName] || "https://www.gran-turismo.com/common/dist/gt7/carlist/car_thumbnails/car_default.png"; }
    
    // ------------------- ОБНОВЛЕНИЕ ПАРАМЕТРОВ -------------------
    function updateCar() {
        if (locks.car) return;
        const carName = getRandomItem(cars);
        document.getElementById('carValue').textContent = carName;
        const iconUrl = getCarIcon(carName);
        const carIcon = document.getElementById('carIcon');
        carIcon.src = iconUrl;
        carIcon.style.display = "block";
        carIcon.onerror = () => { carIcon.style.display = "none"; };
    }
    
    function updateTrack() {
        if (locks.track) return;
        const trackName = getRandomItem(tracks);
        document.getElementById('trackValue').textContent = trackName;
        const iconUrl = tracksIcons[trackName] || "";
        const trackIcon = document.getElementById('trackIcon');
        if (iconUrl) {
            trackIcon.src = iconUrl;
            trackIcon.style.display = "block";
        } else { trackIcon.style.display = "none"; }
    }
    
    function updateWeather() {
        if (locks.weather) return;
        const weather = getRandomItem(weathers);
        document.getElementById('weatherValue').textContent = weather.name;
        document.getElementById('weatherIcon').src = weather.icon;
    }
    
    function updateTime() {
        if (locks.time) return;
        const time = getRandomItem(times);
        document.getElementById('timeValue').textContent = time.name;
        document.getElementById('timeIcon').src = time.icon;
    }
    
    // Обновление только НЕзаблокированных параметров
    function updateUnlockedOnly() {
        updateCar();
        updateTrack();
        updateWeather();
        updateTime();
    }
    
    // Лотерейный эффект только для машины (если не заблокирована)
    function spinCarIfUnlocked() {
        if (locks.car) return;
        const carBlock = document.getElementById('carBlock');
        const carValueDiv = document.getElementById('carValue');
        const carIconImg = document.getElementById('carIcon');
        
        carBlock.classList.add('spinning');
        carValueDiv.classList.add('spin-text');
        if (carIconImg.style.display !== 'none') carIconImg.classList.add('spin-icon');
        
        let spins = 10;
        const interval = setInterval(() => {
            const tempCar = getRandomItem(cars);
            carValueDiv.textContent = tempCar;
            carIconImg.src = getCarIcon(tempCar);
            carIconImg.style.display = "block";
            spins--;
            if (spins <= 0) {
                clearInterval(interval);
                const finalCar = getRandomItem(cars);
                carValueDiv.textContent = finalCar;
                carIconImg.src = getCarIcon(finalCar);
                carBlock.classList.remove('spinning');
                carValueDiv.classList.remove('spin-text');
                carIconImg.classList.remove('spin-icon');
            }
        }, 60);
    }
    
    // ------------------- БЛОКИРОВКА -------------------
    function toggleLock(param) {
        locks[param] = !locks[param];
        const block = document.getElementById(`${param}Block`);
        const lockBtn = block.querySelector('.lock-btn');
        
        if (locks[param]) {
            lockBtn.innerHTML = '🔒';
            block.classList.add('locked');
        } else {
            lockBtn.innerHTML = '🔓';
            block.classList.remove('locked');
        }
    }
    
    // ------------------- ИНИЦИАЛИЗАЦИЯ -------------------
    function init() {
        // Привязываем кнопки блокировки
        document.querySelectorAll('.lock-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const param = btn.getAttribute('data-param');
                toggleLock(param);
            });
        });
        
        // Основная кнопка - меняет только НЕзаблокированные
        document.getElementById('randomBtn').addEventListener('click', () => {
            updateUnlockedOnly();
            // Если машина не заблокирована - добавляем эффект барабана
            if (!locks.car) spinCarIfUnlocked();
        });
        
        // Отдельные кнопки (игнорируют блокировку, но с эффектом)
        document.getElementById('randomCarBtn').addEventListener('click', () => {
            if (!locks.car) spinCarIfUnlocked();
            else alert('🔒 Машина заблокирована! Снимите замочек, чтобы изменить.');
        });
        document.getElementById('randomTrackBtn').addEventListener('click', () => {
            if (!locks.track) updateTrack();
            else alert('🔒 Трасса заблокирована!');
        });
        document.getElementById('randomWeatherBtn').addEventListener('click', () => {
            if (!locks.weather) updateWeather();
            else alert('🔒 Погода заблокирована!');
        });
        document.getElementById('randomTimeBtn').addEventListener('click', () => {
            if (!locks.time) updateTime();
            else alert('🔒 Время заблокировано!');
        });
        
        // Первоначальная загрузка
        updateCar();
        updateTrack();
        updateWeather();
        updateTime();
    }
    
    init();
</script>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>GT7 Random Race — Полный список трасс (погода + время)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a1a;
            color: #eee;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
            touch-action: pan-y pinch-zoom;
        }
        .container {
            background-image: url('images/gt7images.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.62);
            backdrop-filter: blur(2px);
            z-index: 0;
        }
        .container > * {
            position: relative;
            z-index: 1;
        }
        .content {
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
        }
        .param-block {
            margin-bottom: 24px;
            padding: 12px 16px;
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 36px;
            border: 1px solid rgba(255,255,240,0.2);
        }
        .param-header {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .lock-container button {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 6px 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease;
        }
        .lock-container button:active {
            transform: scale(0.92);
        }
        .lock-container img {
            width: 30px;
            height: 30px;
            display: block;
        }
        .param-label {
            font-weight: 800;
            background: #ff4d4dcc;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 15px;
            letter-spacing: 1px;
            color: white;
            backdrop-filter: blur(2px);
        }
        .icon-container {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            min-height: 55px;
        }
        .car-icon {
            max-width: 100%;
            max-height: 75px;
            width: auto;
            object-fit: contain;
        }
        .track-icon {
            max-width: 100%;
            max-height: 65px;
            width: auto;
            object-fit: contain;
        }
        .param-value {
            font-size: 16px;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 16px;
            border-radius: 28px;
            margin-top: 8px;
            word-break: break-word;
            text-align: left;
            border-left: 3px solid #ff4d4d;
        }
        button:not(.lock-btn) {
            background: #ff4d4d;
            border: none;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 60px;
            width: 100%;
            color: white;
            transition: all 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.4);
        }
        button:not(.lock-btn):active {
            transform: scale(0.97);
            background: #e03a3a;
        }
        @media (max-width: 480px) {
            .container { padding: 16px; }
            .param-label { font-size: 13px; padding: 5px 12px; }
            .param-value { font-size: 14px; padding: 10px 12px; }
            .car-icon { max-height: 65px; }
            .track-icon { max-height: 55px; }
            .lock-container img { width: 28px; height: 28px; }
        }
    </style>
</head>

    // Машины (расширенный набор)
    const carIcons = {
        "Abarth 1500 Biposto Bertone B.A.T 1 '52": "car_icons/car1932.png",
        "Abarth 500 '09": "car_icons/car1973.png",
        "BMW M3 '07": "car_icons/car1399.png",
        "Nissan GT-R '17": "car_icons/car2167.png",
        "Porsche 911 GT3 RS '22": "car_icons/car3539.png",
        "Ferrari 488 GTB '19": "car_icons/ferrari488.png",
        "Lamborghini Huracan GT3": "car_icons/lambo.png",
        "Mercedes-AMG GT R '20": "car_icons/amggt.png",
        "Audi R8 LMS Evo": "car_icons/audir8.png"
    };
    const cars = Object.keys(carIcons);
    
    // Пул погоды: сухая (C01-C06) и полная (с дождями R01-R03)
    const dryWeather = ["S01 (Ясно, безоблачно)", "S02 (Ясно, малооблачно)", "S03 (Ясно, переменная облачность)", "S04 (Ясно, легкая дымка)", "S05 (Солнечно, местами облачно)", "S06 (Солнечно, высокая влажность)", "S07 (Солнечно, легкий туман)", "S08 (Солнечно, густая облачность)", "S09 (Солнечно, высокая облачность)", "S10 (Солнечно, дымка от тумана)", "S11 (Солнечно, горный туман)", "S12 (Солнечно, муссонные облака)", "S13 (Солнечно, редкие муссонные облака)", "S14 (Солнечно, плотные муссонные облака)", "S15 (Солнечно, легкая дымка)", "S16 (Солнечно, дымка и облака)", "S17 (Солнечно, высокая облачность)", "S18 (Солнечно, плотная высокая облачность)", "C01 (Пасмурно, но ярко)", "C02 (Пасмурно, тепло)", "C03 (Пасмурно, свежо)", "C04 (Облачно, сухо)", "C05 (Серое небо)", "C06 (Туманно, сухо)"];
    const fullWeather = [...dryWeather, "R01 (Мелкий дождь, морось)", "R02 (Умеренный дождь)", "R03 (Сильный дождь, ливень)", "R04 (Проливной дождь, гроза)", "R05 (Штормовой дождь, сильный ветер)", "R06 (Тропический ливень)", "R07 (Шквалистый дождь)", "R08 (Экстремальный ливень, нулевая видимость)"];

    function getWeatherByType(type) {
        const pool = type === "S01-R08" ? fullWeather : dryWeather;
        return pool[Math.floor(Math.random() * pool.length)];
    }

    let lockCar = false, lockTrack = false, lockWeather = false, lockTime = false;
    let currentTrack = null;
    let currentCar = "", currentTrackName = "", currentWeather = "", currentTimeOption = "";
    
    function getRandomMultiplier() { return Math.floor(Math.random() * 30) + 1; }
    
    function randomCarItem() { return cars[Math.floor(Math.random() * cars.length)]; }
    function randomTrackItem() { return fullTracksList[Math.floor(Math.random() * fullTracksList.length)]; }
    
    function updateDisplay() {
        document.getElementById('carValue').innerText = currentCar;
        document.getElementById('trackValue').innerText = currentTrackName;
        document.getElementById('weatherValue').innerText = currentWeather;
        const mult = getRandomMultiplier();
        document.getElementById('timeValue').innerHTML = `${currentTimeOption} <span style="opacity:0.8; font-size:0.8rem;">(x${mult})</span>`;
        
        const carIconEl = document.getElementById('carIcon');
        if (carIconEl && carIcons[currentCar]) { carIconEl.src = carIcons[currentCar]; carIconEl.style.display = "block"; carIconEl.onerror = () => carIconEl.style.display = "none"; }
        else if(carIconEl) carIconEl.style.display = "none";
        
        const trackIconEl = document.getElementById('trackIcon');
        if (trackIconEl && currentTrack?.icon) { trackIconEl.src = currentTrack.icon; trackIconEl.style.display = "block"; trackIconEl.onerror = () => trackIconEl.style.display = "none"; }
        else if(trackIconEl) trackIconEl.style.display = "none";
    }
    
    function refreshAll(force = true) {
        if (!lockCar || force) currentCar = randomCarItem();
        if (!lockTrack || force) { currentTrack = randomTrackItem(); currentTrackName = currentTrack.name; }
        if (!lockWeather || force) currentWeather = getWeatherByType(currentTrack.weatherType);
        if (!lockTime || force) {
            const times = currentTrack.timeOptions;
            currentTimeOption = times.length ? times[Math.floor(Math.random() * times.length)] : "День";
        }
        updateDisplay();
    }
    
    function updateLockIcons() {
        document.querySelector('#lockCar img').src = lockCar ? "locked.png" : "unlocked.png";
        document.querySelector('#lockTrack img').src = lockTrack ? "locked.png" : "unlocked.png";
        document.querySelector('#lockWeather img').src = lockWeather ? "locked.png" : "unlocked.png";
        document.querySelector('#lockTime img').src = lockTime ? "locked.png" : "unlocked.png";
    }
    
    document.getElementById('lockCar').addEventListener('click', () => { lockCar = !lockCar; updateLockIcons(); if(!lockCar) refreshAll(false); });
    document.getElementById('lockTrack').addEventListener('click', () => { lockTrack = !lockTrack; updateLockIcons(); if(!lockTrack) refreshAll(false); });
    document.getElementById('lockWeather').addEventListener('click', () => { lockWeather = !lockWeather; updateLockIcons(); if(!lockWeather) refreshAll(false); });
    document.getElementById('lockTime').addEventListener('click', () => { lockTime = !lockTime; updateLockIcons(); if(!lockTime) refreshAll(false); });
    document.getElementById('randomBtn').addEventListener('click', () => refreshAll(true));
    
    refreshAll(true);
    updateLockIcons();
</script>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GT7 Random Race</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-image: url('https://static.wikia.nocookie.net/gran-turismo/images/6/69/GT7_Poster.jpg/revision/latest?cb=20210910231708');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #eee;
            text-align: center;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 30px 24px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .result-card {
            background: rgba(5, 7, 15, 0);
            border-radius: 28px;
            padding: 24px;
            margin: 20px 0;
            text-align: left;
            border: 1px solid #334155;
        }
        .param-block {
            margin-bottom: 24px;
            border-bottom: 1px solid #334155;
            padding-bottom: 16px;
        }
        .param-block:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .param-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .param-label {
            font-weight: 700;
            color: #ff4d4d;
            background: #0f172a;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            letter-spacing: 1px;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
        }
        .icon-container {
            flex: 1;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 0;
        }
        .car-icon, .track-icon {
            max-width: 100%;
            max-height: 128px;
            width: auto;
            height: auto;
            object-fit: contain;
        }
        .param-value {
            font-size: 20px;
            font-weight: 600;
            color: #f1f5f9;
            line-height: 1.4;
            word-break: break-word;
            background: #0f172a80;
            padding: 12px 16px;
            border-radius: 20px;
            margin-top: 8px;
        }
        button {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            margin: 8px 6px;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 5px 15px rgba(255,77,77,0.2);
        }
        button:active {
            transform: scale(0.96);
            background: #e03a3a;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 20px 0 10px;
        }
        .btn-group button {
            flex: 1;
            min-width: 100px;
            background: #334155;
            box-shadow: none;
        }
        .btn-group button:active {
            background: #475569;
        }
        .btn-main {
            width: 100%;
            background: #ff4d4d;
            font-size: 18px;
            padding: 16px;
        }
        .footer {
            font-size: 11px;
            color: #475569;
            margin-top: 20px;
        }
        @media (max-width: 480px) {
            .container { padding: 20px 16px; }
            .param-label { font-size: 12px; padding: 6px 12px; }
            .car-icon, .track-icon { max-height: 80px; }
            .param-value { font-size: 18px; padding: 10px 12px; }
            .icon-container { min-height: 40px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="result-card">
            <!-- МАШИНА -->
            <div class="param-block">
                <div class="param-header">
                    <span class="param-label">🏎️ МАШИНА</span>
                    <div class="icon-container">
                        <img class="car-icon" id="carIcon" src="" style="display: none;">
                    </div>
                </div>
                <div class="param-value" id="carValue">—</div>
            </div>
            
            <!-- ТРАССА -->
            <div class="param-block">
                <div class="param-header">
                    <span class="param-label">🛣️ ТРАССА</span>
                    <div class="icon-container">
                        <img class="track-icon" id="trackIcon" src="" style="display: none;">
                    </div>
                </div>
                <div class="param-value" id="trackValue">—</div>
            </div>
            
            <!-- ПОГОДА -->
            <div class="param-block">
                <div class="param-header">
                    <span class="param-label">🌦️ ПОГОДА</span>
                </div>
                <div class="param-value" id="weatherValue">—</div>
            </div>
            
            <!-- ВРЕМЯ -->
            <div class="param-block">
                <div class="param-header">
                    <span class="param-label">⏰ ВРЕМЯ</span>
                </div>
                <div class="param-value" id="timeValue">—</div>
            </div>
        </div>
        
        <button id="randomBtn" class="btn-main">🎲 СЛУЧАЙНАЯ ГОНКА</button>
        
        <div class="btn-group">
            <button id="randomCarBtn">🏎️ Машина</button>
            <button id="randomTrackBtn">🛣️ Трасса</button>
            <button id="randomWeatherBtn">🌦️ Погода</button>
            <button id="randomTimeBtn">⏰ Время</button>
        </div>
        
        <div class="footer">Нажмите на любую кнопку — обновится только выбранный параметр</div>
    </div>

    <script>
        // ==================== ИКОНКИ МАШИН ====================
        const carIcons = {
            "Abarth 1500 Biposto Bertone B.A.T 1 '52": "car_icons/1500_Biposto_Bertone_B.A.T_1_'52.png"
           
        };
        const cars = Object.keys(carIcons);
        
        // ==================== ИКОНКИ ТРАСС ====================
        const tracksIcons = {
            
        };
        const tracks = Object.keys(tracksIcons);
        
        // ==================== ПОГОДА ====================
        const weathers = [
            "S01 (Ясно, безоблачно)",
            "S02 (Ясно, малооблачно)",
            "R01 (Мелкий дождь)"
        ];
        
        // ==================== ВРЕМЯ СУТОК ====================
        const timesBase = [
            "Ранний рассвет",
            "Рассвет",
            "Восход",
            "День",
            "Вечер",
            "Закат",
            "Ночь"
        ];
        
        // ==================== ДИНАМИКА ВРЕМЕНИ (1-30 без пропусков) ====================
        function getRandomTimeDynamic() {
            // Генерируем случайное число от 1 до 30 включительно
            return Math.floor(Math.random() * 30) + 1;
        }
        
        // ==================== ФУНКЦИИ ====================
        function getRandomItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }
        
        function updateCar() {
            const car = getRandomItem(cars);
            document.getElementById('carValue').textContent = car;
            const icon = document.getElementById('carIcon');
            if (carIcons[car]) {
                icon.src = carIcons[car];
                icon.style.display = "block";
                icon.onerror = () => icon.style.display = "none";
            } else {
                icon.style.display = "none";
            }
        }
        
        function updateTrack() {
            const track = getRandomItem(tracks);
            document.getElementById('trackValue').textContent = track;
            const icon = document.getElementById('trackIcon');
            if (tracksIcons[track]) {
                icon.src = tracksIcons[track];
                icon.style.display = "block";
                icon.onerror = () => icon.style.display = "none";
            } else {
                icon.style.display = "none";
            }
        }
        
        function updateWeather() {
            document.getElementById('weatherValue').textContent = getRandomItem(weathers);
        }
        
        function updateTime() {
            document.getElementById('timeValue').textContent = `${getRandomItem(timesBase)} (x${getRandomTimeDynamic()})`;
        }
        
        function updateAll() {
            updateCar();
            updateTrack();
            updateWeather();
            updateTime();
        }
        
        // ==================== ПРИВЯЗКА КНОПОК ====================
        document.getElementById('randomBtn').addEventListener('click', updateAll);
        document.getElementById('randomCarBtn').addEventListener('click', updateCar);
        document.getElementById('randomTrackBtn').addEventListener('click', updateTrack);
        document.getElementById('randomWeatherBtn').addEventListener('click', updateWeather);
        document.getElementById('randomTimeBtn').addEventListener('click', updateTime);
        
        updateAll();
    </script>
</body>
</html>

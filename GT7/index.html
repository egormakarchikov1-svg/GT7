<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>GT7 Random Race - Блокировка параметров 🔒</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-image: url('https://static.wikia.nocookie.net/gran-turismo/images/6/69/GT7_Poster.jpg/revision/latest?cb=20210910231708');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #eee;
            text-align: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        
        .container {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 44px;
            padding: 20px 18px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .result-card {
            background: rgba(5, 7, 15, 0);
            border-radius: 28px;
            padding: 16px 18px;
            margin: 12px 0;
            text-align: left;
            border: 1px solid rgba(51, 65, 85, 0.6);
        }
        
        .param-block {
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
            padding-bottom: 14px;
        }
        
        .param-block:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .param-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        
        .lock-btn {
            background: transparent;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 30px;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
        }
        
        .lock-btn:active {
            transform: scale(0.92);
        }
        
        .lock-btn.locked {
            color: #ff4d4d;
        }
        
        .lock-btn.unlocked {
            color: #fbbf24;
        }
        
        .param-label {
            font-weight: 700;
            color: #ff4d4d;
            background: rgba(15, 23, 42, 0.8);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 14px;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(2px);
            white-space: nowrap;
        }
        
        .icon-container {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-left: 8px;
        }
        
        .car-icon, .track-icon {
            width: auto;
            height: 50px;
            max-width: 100%;
            object-fit: contain;
        }
        
        .weather-icon, .time-icon {
            width: auto;
            height: 40px;
            object-fit: contain;
        }
        
        .param-value {
            font-size: 15px;
            font-weight: 600;
            color: #f1f5f9;
            line-height: 1.4;
            word-break: break-word;
            background: rgba(15, 23, 42, 0.6);
            padding: 10px 14px;
            border-radius: 20px;
            margin-top: 8px;
            backdrop-filter: blur(2px);
            text-align: center;
        }
        
        button:not(.lock-btn) {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            margin: 8px 6px;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 5px 15px rgba(255,77,77,0.2);
        }
        
        button:not(.lock-btn):active {
            transform: scale(0.96);
            background: #e03a3a;
        }
        
        .btn-main {
            width: 100%;
            background: #ff4d4d;
            font-size: 18px;
            padding: 16px;
        }
        
        .btn-icon {
            width: 20px;
            height: 20px;
            filter: brightness(0) invert(1);
        }
        
        .footer {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 16px;
            text-align: center;
        }
        
        @media (max-width: 480px) {
            body { padding: 12px; }
            .container { padding: 16px 14px; border-radius: 36px; }
            .result-card { padding: 12px 14px; }
            .param-label { font-size: 12px; padding: 5px 12px; white-space: normal; }
            .lock-btn { font-size: 18px; min-width: 32px; }
            .car-icon, .track-icon { height: 40px; }
            .weather-icon, .time-icon { height: 32px; }
            .param-value { font-size: 13px; padding: 8px 12px; }
        }
        
        @media (max-width: 380px) {
            .param-label { font-size: 11px; padding: 4px 10px; }
            .car-icon, .track-icon { height: 35px; }
            .weather-icon, .time-icon { height: 28px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="result-card">
        
        <!-- МАШИНА -->
        <div class="param-block">
            <div class="param-header">
                <button class="lock-btn unlocked" id="lockCar">🔓</button>
                <span class="param-label">🏎️ МАШИНА</span>
                <div class="icon-container">
                    <img class="car-icon" id="carIcon" src="" style="display: none;">
                </div>
            </div>
            <div class="param-value" id="carValue">—</div>
        </div>
        
        <!-- ТРАССА -->
        <div class="param-block">
            <div class="param-header">
                <button class="lock-btn unlocked" id="lockTrack">🔓</button>
                <span class="param-label">🛣️ ТРАССА</span>
                <div class="icon-container">
                    <img class="track-icon" id="trackIcon" src="" style="display: none;">
                </div>
            </div>
            <div class="param-value" id="trackValue">—</div>
        </div>
        
        <!-- ПОГОДА -->
        <div class="param-block">
            <div class="param-header">
                <button class="lock-btn unlocked" id="lockWeather">🔓</button>
                <span class="param-label">🌦️ ПОГОДА</span>
                <div class="icon-container">
                    <img class="weather-icon" id="weatherIcon" src="" style="display: none;">
                </div>
            </div>
            <div class="param-value" id="weatherValue">—</div>
        </div>
        
        <!-- ВРЕМЯ -->
        <div class="param-block">
            <div class="param-header">
                <button class="lock-btn unlocked" id="lockTime">🔓</button>
                <span class="param-label">⏰ ВРЕМЯ</span>
                <div class="icon-container">
                    <img class="time-icon" id="timeIcon" src="" style="display: none;">
                </div>
            </div>
            <div class="param-value" id="timeValue">—</div>
        </div>
    </div>
    
    <button id="randomBtn" class="btn-main">
        <img src="https://img.icons8.com/?size=80&id=raY4YhlfR3SI&format=png" class="btn-icon" alt="dice">
        🎲 СЛУЧАЙНАЯ ГОНКА
    </button>
    
    <div class="footer">🔓 — разблокировано (будет меняться) | 🔒 — заблокировано (не изменится)</div>
</div>

<script>
    // ==================== БАЗОВЫЙ URL ДЛЯ ИКОНОК НА GITHUB ====================
    // ЗАМЕНИТЕ username И repository НА ВАШИ
    const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/egormakarchikov1-svg/GT7/main';
    
    // ==================== ИКОНКИ МАШИН (через GitHub) ====================
    const carIcons = {
        "Abarth 1500 Biposto Bertone B.A.T 1 '52": "car_icons/car1932.png",
        "Abarth 500 '09": `${GITHUB_RAW_URL}/car_icons/car3438.png`,
        "Abarth 595 SS '70": `${GITHUB_RAW_URL}/car_icons/car3579.png`,
        "AFEELA 1 '26": `${GITHUB_RAW_URL}/car_icons/car3546.png`
    };
    const cars = Object.keys(carIcons);
    
    // ==================== ИКОНКИ ТРАСС (через GitHub) ====================
    const tracksIcons = {
        "Франция Alsace - Деревня": "track_icons/bbe708-D-n15MKA.png",
        "Франция Alsace - Деревня (обратн.)": `${GITHUB_RAW_URL}/track_icons/bbe708-D-n15MKA.png`,
        "Франция Alsace - тестовая трасса": `${GITHUB_RAW_URL}/track_icons/bbe708-D-n15MKA.png`,
        "Франция Alsace - тестовая трасса (обратн.)": `${GITHUB_RAW_URL}/track_icons/bbe708-D-n15MKA.png`
    };
    const tracks = Object.keys(tracksIcons);
    
    // ==================== ПОГОДА ====================
    const weathers = [
        { name: "S01 (Ясно, безоблачно)", icon: "https://img.icons8.com/?size=48&id=8EUmYhfLPTCF&format=png" },
        { name: "S02 (Ясно, малооблачно)", icon: "https://img.icons8.com/?size=48&id=8EUmYhfLPTCF&format=png" },
        { name: "R01 (Мелкий дождь, морось)", icon: "https://img.icons8.com/?size=48&id=PIXtKMDAXCzo&format=png" }
    ];
    
    // ==================== ВРЕМЯ СУТОК ====================
    const times = [
        { name: "Ранний рассвет", icon: "https://img.icons8.com/?size=64&id=eyfQLJcRAECO&format=png" },
        { name: "Рассвет", icon: "https://img.icons8.com/?size=64&id=eyfQLJcRAECO&format=png" },
        { name: "Восход", icon: "https://img.icons8.com/?size=64&id=eyfQLJcRAECO&format=png" },
        { name: "Утро", icon: "https://img.icons8.com/?size=64&id=WthylEaM51Fy&format=png" },
        { name: "День", icon: "https://img.icons8.com/?size=64&id=d8hn2NDFO0Xa&format=png" },
        { name: "Вечер", icon: "https://img.icons8.com/?size=64&id=Y99GcERWY0xR&format=png" },
        { name: "Закат", icon: "https://img.icons8.com/?size=64&id=0EKLxGXpW9ga&format=png" },
        { name: "Сумерки", icon: "https://images.icon-icons.com/1448/PNG/96/42518cityscapeatdusk_99026.png" },
        { name: "Ночь", icon: "https://img.icons8.com/?size=48&id=MwB9VqhaZWPz&format=png" },
        { name: "Полночь", icon: "https://images.icon-icons.com/1448/PNG/96/42513nightwithstars_99010.png" }
    ];
    
    // ==================== СОСТОЯНИЯ БЛОКИРОВКИ ====================
    let lockCar = false;
    let lockTrack = false;
    let lockWeather = false;
    let lockTime = false;
    
    // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
    function getRandomItem(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }
    
    function getRandomTimeDynamic() {
        return Math.floor(Math.random() * 30) + 1;
    }
    
    // ==================== ФУНКЦИИ ОБНОВЛЕНИЯ ====================
    function updateCar() {
        if (lockCar) return;
        const carName = getRandomItem(cars);
        document.getElementById('carValue').textContent = carName;
        const icon = document.getElementById('carIcon');
        if (carIcons[carName]) {
            icon.src = carIcons[carName];
            icon.style.display = "block";
            icon.onerror = () => { icon.style.display = "none"; };
        } else {
            icon.style.display = "none";
        }
    }
    
    function updateTrack() {
        if (lockTrack) return;
        const trackName = getRandomItem(tracks);
        document.getElementById('trackValue').textContent = trackName;
        const icon = document.getElementById('trackIcon');
        if (tracksIcons[trackName]) {
            icon.src = tracksIcons[trackName];
            icon.style.display = "block";
            icon.onerror = () => { icon.style.display = "none"; };
        } else {
            icon.style.display = "none";
        }
    }
    
    function updateWeather() {
        if (lockWeather) return;
        const weather = getRandomItem(weathers);
        document.getElementById('weatherValue').textContent = weather.name;
        document.getElementById('weatherIcon').src = weather.icon;
        document.getElementById('weatherIcon').style.display = "block";
    }
    
    function updateTime() {
        if (lockTime) return;
        const time = getRandomItem(times);
        const dynamic = getRandomTimeDynamic();
        document.getElementById('timeValue').textContent = `${time.name} (X${dynamic.toString().padStart(2, '0')})`;
        document.getElementById('timeIcon').src = time.icon;
        document.getElementById('timeIcon').style.display = "block";
    }
    
    function updateAll() {
        updateCar();
        updateTrack();
        updateWeather();
        updateTime();
    }
    
    // ==================== ОБНОВЛЕНИЕ ВИДА ЗАМОЧКОВ ====================
    function updateLockButtons() {
        const carBtn = document.getElementById('lockCar');
        const trackBtn = document.getElementById('lockTrack');
        const weatherBtn = document.getElementById('lockWeather');
        const timeBtn = document.getElementById('lockTime');
        
        carBtn.textContent = lockCar ? '🔒' : '🔓';
        carBtn.classList.toggle('locked', lockCar);
        carBtn.classList.toggle('unlocked', !lockCar);
        
        trackBtn.textContent = lockTrack ? '🔒' : '🔓';
        trackBtn.classList.toggle('locked', lockTrack);
        trackBtn.classList.toggle('unlocked', !lockTrack);
        
        weatherBtn.textContent = lockWeather ? '🔒' : '🔓';
        weatherBtn.classList.toggle('locked', lockWeather);
        weatherBtn.classList.toggle('unlocked', !lockWeather);
        
        timeBtn.textContent = lockTime ? '🔒' : '🔓';
        timeBtn.classList.toggle('locked', lockTime);
        timeBtn.classList.toggle('unlocked', !lockTime);
    }
    
    // ==================== ОБРАБОТЧИКИ КНОПОК ====================
    document.getElementById('lockCar').addEventListener('click', () => {
        lockCar = !lockCar;
        updateLockButtons();
    });
    
    document.getElementById('lockTrack').addEventListener('click', () => {
        lockTrack = !lockTrack;
        updateLockButtons();
    });
    
    document.getElementById('lockWeather').addEventListener('click', () => {
        lockWeather = !lockWeather;
        updateLockButtons();
    });
    
    document.getElementById('lockTime').addEventListener('click', () => {
        lockTime = !lockTime;
        updateLockButtons();
    });
    
    document.getElementById('randomBtn').addEventListener('click', updateAll);
    
    // ==================== ИНИЦИАЛИЗАЦИЯ ====================
    updateLockButtons();
    updateAll();
</script>
</body>
</html>

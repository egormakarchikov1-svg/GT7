<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>GT7 Random Race - Реальные условия трасс</title>

    <link rel="apple-touch-icon" href="gt7.png">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-image: url('images/gt7images.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            color: #eee; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 12px;
        }
        
        .container { 
            background: rgba(30, 41, 59, 0.75); 
            backdrop-filter: blur(5px); 
            border-radius: 28px; 
            padding: 16px 12px; 
            width: 100%; 
            max-width: 550px; 
            box-shadow: 0 10px 25px rgba(30, 41, 59, 0.7); 
            border: 1px solid rgba(255,255,255,0.1); 
            transition: all 0.3s ease;
        }
        
        /* ВСЕГДА 2 КОЛОНКИ — И В ГОРИЗОНТАЛИ, И В ВЕРТИКАЛИ */
        .params-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
        }
        
        .result-card { background: rgba(5, 7, 15, 0); border-radius: 20px; padding: 8px; margin: 0 0 12px 0; text-align: center; border: 1px solid #334155; }
        
        .param-block { margin-bottom: 0; text-align: center; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
        
        .param-header { display: flex; align-items: center; justify-content: center; gap: 1px; margin-bottom: 10px; width: 100%; }
        
        .param-label { 
            font-weight: 700; 
            color: #ffffff; 
            background: #0f172a; 
            padding: 8px 12px; 
            border-radius: 30px; 
            font-size: 14px; 
            letter-spacing: 1px; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            gap: 6px; 
        }
        
        .lock-btn { 
            background: rgba(0, 0, 0, 0.6); 
            border: none; 
            border-radius: 20px; 
            font-size: 14px; 
            padding: 4px 10px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            backdrop-filter: blur(4px); 
            margin: 0; 
            box-shadow: none; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .lock-btn:active { transform: scale(0.95); }
        .lock-btn[data-state="unlocked"] { background: #22c55e; color: white; box-shadow: 0 0 8px rgba(34, 197, 94, 0.5); }
        .lock-btn[data-state="locked"] { background: #ef4444; color: white; box-shadow: 0 0 8px rgba(239, 68, 68, 0.5); }
        
        .header-icon { width: 18px; height: 18px; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
        
        .icon-container, .weather-icon-container, .time-icon-container { background: transparent; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
        
        .car-icon, .track-icon { max-width: 100%; width: auto; height: auto; object-fit: contain; }
        .weather-display-icon, .time-display-icon { object-fit: contain; }
        
        .param-value { 
            font-size: 14px; 
            font-weight: 600; 
            color: #f1f5f9; 
            line-height: 1.3; 
            word-break: break-word; 
            background: #0f172a80; 
            padding: 8px 10px; 
            border-radius: 16px; 
            margin-top: 6px; 
            width: 100%; 
        }
        
        .x-value { font-size: 12px; background: #ff4d4d80; padding: 4px 8px; margin-top: 4px; }
        
        button { 
            background: #ff4d4d; 
            color: white; 
            border: none; 
            padding: 10px 16px; 
            font-size: 13px; 
            font-weight: 600; 
            border-radius: 60px; 
            cursor: pointer; 
            margin: 6px 4px; 
            transition: all 0.2s ease; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            gap: 6px; 
            box-shadow: 0 5px 15px rgba(255,77,77,0.2); 
        }
        
        button:active { transform: scale(0.96); background: #e03a3a; }
        
        .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 15px 0 8px; }
        .btn-group button { flex: 1; min-width: 80px; background: #334155; box-shadow: none; font-size: 11px; padding: 8px 10px; }
        
        .btn-main { 
            width: auto; 
            min-width: 180px; 
            background: #ff4d4d; 
            font-size: 16px; 
            padding: 12px 20px; 
            display: inline-flex; 
            margin: 8px auto; 
            font-family: 'Rajdhani', 'Orbitron', 'Segoe UI', sans-serif;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        
        .btn-icon { vertical-align: middle; margin-right: 5px; filter: brightness(0) invert(1); width: 16px; height: 16px; }
        
        .similar-cars-container { background: rgba(0, 0, 0, 0.4); border-radius: 16px; padding: 12px; margin: 12px 0; border: 1px solid #ff4d4d; }
        .similar-title { color: #ff4d4d; font-size: 16px; font-weight: bold; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .ref-car-info { background: #ff4d4d20; padding: 8px; border-radius: 10px; margin-bottom: 12px; font-size: 13px; border-left: 3px solid #ff4d4d; }
        .similar-list { list-style: none; text-align: left; }
        .similar-list li { 
            background: #0f172a80; 
            margin: 6px 0; 
            padding: 8px 10px; 
            border-radius: 10px; 
            font-size: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            gap: 8px; 
            flex-wrap: wrap; 
            transition: all 0.2s; 
            cursor: pointer; 
        }
        .similar-list li:active { background: #1e293b; transform: scale(0.99); }
        .car-name { font-weight: bold; flex: 2; min-width: 100px; font-size: 13px; }
        .car-stats { color: #ff4d4d; font-size: 10px; display: flex; gap: 8px; }
        .similarity-badge { background: #22c55e; color: white; padding: 2px 6px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .btn-similar { background: #7c3aed; margin-top: 5px; font-size: 12px; padding: 8px 12px; width: 100%; }
        
        /* ============================================ */
        /* АДАПТАЦИЯ ПОД ОРИЕНТАЦИЮ (2 колонки всегда) */
        /* ============================================ */
        
        /* ВЕРТИКАЛЬНАЯ ОРИЕНТАЦИЯ (портрет) */
        @media (orientation: portrait) {
            body { padding: 12px; }
            .container { max-width: 550px; padding: 16px 12px; }
            .params-grid { gap: 15px; }
            .param-label { font-size: 14px; padding: 8px 12px; }
            .icon-container, .weather-icon-container, .time-icon-container { min-height: 80px; }
            .car-icon, .track-icon { max-height: 85px; }
            .weather-display-icon, .time-display-icon { width: 55px; height: 55px; }
            .param-value { font-size: 14px; padding: 8px 10px; }
            .btn-main { min-width: 180px; font-size: 16px; padding: 12px 20px; }
            .similar-title { font-size: 16px; }
        }
        
        /* ГОРИЗОНТАЛЬНАЯ ОРИЕНТАЦИЯ (ландшафт) */
        @media (orientation: landscape) {
            body { padding: 8px; }
            .container { max-width: 95%; padding: 12px; }
            .params-grid { gap: 12px; }
            .param-label { font-size: 11px; padding: 5px 8px; }
            .param-label .header-icon { width: 14px; height: 14px; }
            .icon-container, .weather-icon-container, .time-icon-container { min-height: 55px; }
            .car-icon, .track-icon { max-height: 55px; }
            .weather-display-icon, .time-display-icon { width: 38px; height: 38px; }
            .param-value { font-size: 11px; padding: 5px 6px; }
            .x-value { font-size: 10px; padding: 3px 6px; }
            .btn-main { min-width: 140px; font-size: 13px; padding: 8px 14px; }
            .similar-cars-container { padding: 8px; margin: 8px 0; }
            .similar-title { font-size: 12px; margin-bottom: 8px; }
            .ref-car-info { font-size: 10px; padding: 6px; }
            .similar-list li { padding: 5px 8px; font-size: 10px; }
            .car-name { font-size: 11px; }
            .car-stats { font-size: 9px; gap: 5px; }
            .similarity-badge { font-size: 9px; padding: 1px 4px; }
            .btn-similar { font-size: 10px; padding: 6px 10px; }
            .btn-group button { font-size: 9px; padding: 5px 6px; min-width: 60px; }
        }
        
        /* МАЛЕНЬКИЕ ТЕЛЕФОНЫ (iPhone SE и меньше) */
        @media (max-width: 380px) and (orientation: portrait) {
            .container { padding: 12px 8px; }
            .params-grid { gap: 10px; }
            .param-label { font-size: 11px; padding: 5px 8px; }
            .icon-container, .weather-icon-container, .time-icon-container { min-height: 65px; }
            .car-icon, .track-icon { max-height: 65px; }
            .weather-display-icon, .time-display-icon { width: 45px; height: 45px; }
            .param-value { font-size: 12px; padding: 6px 8px; }
            .btn-main { min-width: 150px; font-size: 14px; padding: 10px 16px; }
            .similar-list li { flex-direction: column; text-align: center; }
            .car-stats { justify-content: center; }
        }
        
        /* ОЧЕНЬ УЗКИЙ ЛАНДШАФТ (например, iPhone SE в горизонтали) */
        @media (max-width: 700px) and (orientation: landscape) {
            .container { padding: 8px; }
            .params-grid { gap: 8px; }
            .param-label { font-size: 10px; padding: 4px 6px; }
            .icon-container, .weather-icon-container, .time-icon-container { min-height: 45px; }
            .car-icon, .track-icon { max-height: 42px; }
            .weather-display-icon, .time-display-icon { width: 30px; height: 30px; }
            .param-value { font-size: 10px; padding: 4px 5px; }
            .similar-list li { flex-direction: row; flex-wrap: wrap; }
        }
    </style>
</head>

        </div>
    </div>
    
    <div class="similar-cars-container">

        <div id="refCarInfo" class="ref-car-info">Выберите референсный автомобиль (нажмите на авто в списке ниже)</div>
        <ul class="similar-list" id="similarList"><li>Нажмите на любой автомобиль в списке, чтобы выбрать референс</li></ul>
        <button id="refreshSimilarBtn" class="btn-similar">🔄 ПОВТОРНЫЙ ВЫБОР 5 СХОЖИХ АВТО</button>
    </div>
    
    <div style="text-align: center;">
        <button id="randomBtn" class="btn-main"><img src="https://img.icons8.com/?size=80&id=raY4YhlfR3SI&format=png" class="btn-icon" alt="dice" style="filter: none !important;"> СЛУЧАЙНАЯ ГОНКА</button>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GT7 Random Race</title>

    <link rel="apple-touch-icon" href="gt7.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a1a;
            color: #eee;
            text-align: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        
        /* Контейнер с фоновым изображением */
        .container {
            background-image: url('https://static.wikia.nocookie.net/gran-turismo/images/6/69/GT7_Poster.jpg/revision/latest?cb=20210910231708');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            border-radius: 48px;
            position: relative;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        
        /* Затемнение фона */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(0px);
            border-radius: 48px;
            z-index: 0;
        }
        
        .container > * {
            position: relative;
            z-index: 1;
        }
        
        .result-card {
            background: rgba(30, 41, 59, 0.65);
            border-radius: 44px;
            padding: 20px 18px 24px 18px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.12);
        }
        
        .param-block {
            margin-bottom: 20px;
        }
        
        .param-block:last-child {
            margin-bottom: 16px;
        }
        
        /* Строка: замок + название + иконка (иконка растягивается) */
        .param-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .lock-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }
        
        .param-label {
            font-weight: 700;
            color: #ff4d4d;
            background: rgba(15, 23, 42, 0.75);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 13px;
            letter-spacing: 1px;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            flex-shrink: 0;
        }
        
        /* Контейнер иконки — занимает всё оставшееся место */
        .icon-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            min-height: 55px;
        }
        
        /* Иконки машин и трасс — максимально большие */
        .car-icon, .track-icon {
            max-width: 100%;
            max-height: 90px;
            width: auto;
            height: auto;
            object-fit: contain;
        }
        
        .param-value {
            display: block;
            width: 100%;
            font-size: 15px;
            font-weight: 600;
            color: #f1f5f9;
            line-height: 1.4;
            word-break: break-word;
            white-space: normal;
            overflow-wrap: break-word;
            background: rgba(15, 23, 42, 0.6);
            padding: 8px 12px;
            border-radius: 20px;
            margin-top: 6px;
            text-align: left;
        }
        
        button.lock-btn {
            background: transparent !important;
            border: none !important;
            cursor: pointer !important;
            padding: 4px 6px !important;
            margin: 0 !important;
            width: auto !important;
            min-width: 36px !important;
            box-shadow: none !important;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        
        button.lock-btn img {
            width: 22px;
            height: 22px;
            display: block;
        }
        
        button.lock-btn:active {
            transform: scale(0.92);
        }
        
        button:not(.lock-btn) {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 12px 18px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(255,77,77,0.25);
        }
        
        button:not(.lock-btn):active {
            transform: scale(0.97);
            background: #e03a3a;
        }
        
        .btn-main {
            width: 100%;
            background: #ff4d4d;
            font-size: 17px;
            padding: 14px;
            margin-top: 8px;
        }
        
        @media (max-width: 480px) {
            body { padding: 12px; }
            .result-card { padding: 16px 14px 20px 14px; }
            .param-label { font-size: 12px; padding: 4px 10px; }
            .icon-container { min-height: 48px; }
            .car-icon, .track-icon { max-height: 75px; }
            .param-value { font-size: 13px; padding: 7px 10px; }
            button.lock-btn img { width: 18px; height: 18px; }
            button:not(.lock-btn) { padding: 10px 16px; font-size: 15px; }
            .btn-main { font-size: 16px; padding: 12px; margin-top: 6px; }
        }
        
        @media (max-width: 360px) {
            .result-card { padding: 14px 12px 18px 12px; }
            .param-label { font-size: 11px; padding: 4px 8px; }
            .param-value { font-size: 12px; padding: 6px 8px; }
            .btn-main { font-size: 15px; padding: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="result-card">
            <!-- МАШИНА -->
            <div class="param-block">
                <div class="param-header">
                    <div class="lock-container">
                        <button class="lock-btn" id="lockCar">
                            <img src="unlocked.png" alt="Разблокировано">
                        </button>
                    </div>
                    <span class="param-label">🏎️ МАШИНА</span>
                    <div class="icon-container">
                        <img class="car-icon" id="carIcon" src="" style="display: none;">
                    </div>
                </div>
                <div class="param-value" id="carValue">—</div>
            </div>
            
            <!-- ТРАССА -->
            <div class="param-block">
                <div class="param-header">
                    <div class="lock-container">
                        <button class="lock-btn" id="lockTrack">
                            <img src="unlocked.png" alt="Разблокировано">
                        </button>
                    </div>
                    <span class="param-label">🛣️ ТРАССА</span>
                    <div class="icon-container">
                        <img class="track-icon" id="trackIcon" src="" style="display: none;">
                    </div>
                </div>
                <div class="param-value" id="trackValue">—</div>
            </div>
            
            <!-- ПОГОДА -->
            <div class="param-block">
                <div class="param-header">
                    <div class="lock-container">
                        <button class="lock-btn" id="lockWeather">
                            <img src="unlocked.png" alt="Разблокировано">
                        </button>
                    </div>
                    <span class="param-label">🌦️ ПОГОДА</span>
                </div>
                <div class="param-value" id="weatherValue">—</div>
            </div>
            
            <!-- ВРЕМЯ -->
            <div class="param-block">
                <div class="param-header">
                    <div class="lock-container">
                        <button class="lock-btn" id="lockTime">
                            <img src="unlocked.png" alt="Разблокировано">
                        </button>
                    </div>
                    <span class="param-label">⏰ ВРЕМЯ</span>
                </div>
                <div class="param-value" id="timeValue">—</div>
            </div>
            
            <button id="randomBtn" class="btn-main">🎲 СЛУЧАЙНАЯ ГОНКА</button>
        </div>
    </div>

    <script>
        // ==================== ВРЕМЯ СУТОК ====================
        const timesBase = [
            "Ранний рассвет",
            "Рассвет", 
            "Восход", 
            "Раннее утро", 
            "Утро",
            "Позднее утро", 
            "День", 
            "После полудня", 
            "Полдень", 
            "Ранний вечер",
            "Вечер", 
            "Закат", 
            "Сумерки", 
            "Ночь", 
            "Полночь"
        ];
        
        // ==================== МАШИНЫ ====================
        const carIcons = {
            "Abarth 1500 Biposto Bertone B.A.T 1 '52": "https://www.gran-turismo.com/common/dist/gt7/carlist/car_thumbnails/car1932.png",
            "Abarth 500 '09": "https://www.gran-turismo.com/common/dist/gt7/carlist/car_thumbnails/car3438.png",
            "BMW M3 '07": "https://www.gran-turismo.com/common/dist/gt7/carlist/car_thumbnails/car1399.png",
            "Nissan GT-R '17": "https://www.gran-turismo.com/common/dist/gt7/carlist/car_thumbnails/car2167.png",
            "Porsche 911 GT3 RS '22": "https://www.gran-turismo.com/common/dist/gt7/carlist/car_thumbnails/car3539.png"
        };
        const cars = Object.keys(carIcons);
        
        // ==================== ТРАССЫ ====================
        const tracksIcons = {
            "Франция Alsace - Деревня": "https://www.gran-turismo.com/common/dist/gt7/tracklist/assets/bbe708-D-n15MKA.png",
            "Италия Autodrome Lago Maggiore - Восток": "https://www.gran-turismo.com/common/dist/gt7/tracklist/assets/39f155-Dg_fFdVS.png",
            "США Blue Moon Bay Speedway": "https://www.gran-turismo.com/common/dist/gt7/tracklist/assets/971481-BdMNGGxX.png",
            "Япония Tokyo Expressway - Восток": "https://www.gran-turismo.com/common/dist/gt7/tracklist/assets/e9dd33-B7sGBTmw.png",
            "Германия Nürburgring Nordschleife": "https://www.gran-turismo.com/common/dist/gt7/tracklist/assets/246f6d-B2a8UX0a.png"
        };
        const tracks = Object.keys(tracksIcons);
        
        // ==================== ПОГОДА ====================
        const weathers = [
            "S01 (Ясно, безоблачно)", "S02 (Ясно, малооблачно)", "S03 (Ясно, переменная облачность)",
            "C01 (Пасмурно, но ярко)", "C02 (Пасмурно, тепло)",
            "R01 (Мелкий дождь, морось)", "R02 (Умеренный дождь)", "R03 (Сильный дождь, ливень)"
        ];
        
        // ==================== СОСТОЯНИЕ БЛОКИРОВОК ====================
        let lockCar = false;
        let lockTrack = false;
        let lockWeather = false;
        let lockTime = false;
        
        // ==================== ДИНАМИКА ВРЕМЕНИ ====================
        function getRandomTimeDynamic() {
            return Math.floor(Math.random() * 30) + 1;
        }
        
        function getRandomItem(arr) {
            if (!arr || arr.length === 0) return "—";
            return arr[Math.floor(Math.random() * arr.length)];
        }
        
        // ==================== ФУНКЦИИ ОБНОВЛЕНИЯ ====================
        function updateCar(force = false) {
            if (!lockCar || force) {
                const car = getRandomItem(cars);
                const carElement = document.getElementById('carValue');
                if (carElement) carElement.textContent = car;
                const icon = document.getElementById('carIcon');
                if (icon && carIcons[car]) {
                    icon.src = carIcons[car];
                    icon.style.display = "block";
                    icon.onerror = () => { if(icon) icon.style.display = "none"; };
                } else if (icon) {
                    icon.style.display = "none";
                }
            }
        }
        
        function updateTrack(force = false) {
            if (!lockTrack || force) {
                const track = getRandomItem(tracks);
                const trackElement = document.getElementById('trackValue');
                if (trackElement) trackElement.textContent = track;
                const icon = document.getElementById('trackIcon');
                if (icon && tracksIcons[track]) {
                    icon.src = tracksIcons[track];
                    icon.style.display = "block";
                    icon.onerror = () => { if(icon) icon.style.display = "none"; };
                } else if (icon) {
                    icon.style.display = "none";
                }
            }
        }
        
        function updateWeather(force = false) {
            if (!lockWeather || force) {
                const weather = getRandomItem(weathers);
                const weatherElement = document.getElementById('weatherValue');
                if (weatherElement) weatherElement.textContent = weather;
            }
        }
        
        function updateTime(force = false) {
            if (!lockTime || force) {
                const time = getRandomItem(timesBase);
                const dynamic = getRandomTimeDynamic();
                const timeElement = document.getElementById('timeValue');
                if (timeElement) timeElement.textContent = `${time} (x${dynamic})`;
            }
        }
        
        function updateAll() {
            updateCar();
            updateTrack();
            updateWeather();
            updateTime();
        }
        
        // ==================== ОБНОВЛЕНИЕ ВИДА КНОПОК-ЗАМОЧКОВ ====================
        function updateLockButtons() {
            const carBtn = document.getElementById('lockCar');
            const trackBtn = document.getElementById('lockTrack');
            const weatherBtn = document.getElementById('lockWeather');
            const timeBtn = document.getElementById('lockTime');
            
            if (carBtn) carBtn.innerHTML = lockCar ? '<img src="locked.png" alt="Заблокировано">' : '<img src="unlocked.png" alt="Разблокировано">';
            if (trackBtn) trackBtn.innerHTML = lockTrack ? '<img src="locked.png" alt="Заблокировано">' : '<img src="unlocked.png" alt="Разблокировано">';
            if (weatherBtn) weatherBtn.innerHTML = lockWeather ? '<img src="locked.png" alt="Заблокировано">' : '<img src="unlocked.png" alt="Разблокировано">';
            if (timeBtn) timeBtn.innerHTML = lockTime ? '<img src="locked.png" alt="Заблокировано">' : '<img src="unlocked.png" alt="Разблокировано">';
        }
        
        // ==================== ОБРАБОТЧИКИ КНОПОК ====================
        const lockCarBtn = document.getElementById('lockCar');
        const lockTrackBtn = document.getElementById('lockTrack');
        const lockWeatherBtn = document.getElementById('lockWeather');
        const lockTimeBtn = document.getElementById('lockTime');
        const randomBtn = document.getElementById('randomBtn');
        
        if (lockCarBtn) lockCarBtn.addEventListener('click', () => { lockCar = !lockCar; updateLockButtons(); });
        if (lockTrackBtn) lockTrackBtn.addEventListener('click', () => { lockTrack = !lockTrack; updateLockButtons(); });
        if (lockWeatherBtn) lockWeatherBtn.addEventListener('click', () => { lockWeather = !lockWeather; updateLockButtons(); });
        if (lockTimeBtn) lockTimeBtn.addEventListener('click', () => { lockTime = !lockTime; updateLockButtons(); });
        if (randomBtn) randomBtn.addEventListener('click', updateAll);
        
        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        updateLockButtons();
        updateAll();
    </script>
</body>
</html>
